<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
    
    <title>Katalog Produktów | TOMASZEK GROUP</title>
    <meta name="description" content="Oficjalny katalog produktów Tomaszek Group. Szeroki wybór zabawek, okularów i artykułów sezonowych.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root { --gold-light: #f3d97d; --gold-dark: #d4af37; --dark-bg: #1e1e26; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--dark-bg);
            color: white; 
            margin: 0; 
            min-height: 100vh;
        }

        .logo-text-gold {
            background: linear-gradient(to bottom, var(--gold-light), var(--gold-dark));
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
        }

        /* Капсула как на главной */
        .lang-capsule {
            display: flex; align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 99px; padding: 4px 12px;
            font-size: 11px; font-weight: 900;
        }

        /* Исчезающая линия */
        .animated-line {
            height: 1px;
            background: linear-gradient(to right, var(--gold-dark), transparent);
            width: 0;
            opacity: 0;
            animation: lineFlow 2s ease-out forwards;
            animation-delay: 0.5s;
        }

        @keyframes lineFlow {
            0% { width: 0; opacity: 0; }
            20% { opacity: 1; }
            100% { width: 100%; opacity: 0; }
        }

        /* Сетка и Карточки */
        .catalog-container {
            max-width: 1280px; 
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        .category-card { 
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            position: relative; 
            overflow: hidden; 
            aspect-ratio: 1/1;
            display: block;
        }
        
        .category-card:hover { 
            border-color: var(--gold-dark);
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .category-card img { 
            width: 100%; height: 100%; object-fit: cover; 
            transition: transform 1.2s ease; 
            filter: brightness(0.5); 
        }

        .category-card:hover img { transform: scale(1.1); filter: brightness(0.8); }

        .card-overlay { 
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 60%); 
            position: absolute; inset: 0; 
            display: flex; align-items: flex-end; padding: 20px; 
        }

        /* Loader */
        #loader {
            position: fixed; inset: 0; background: #1e1e26;
            display: flex; align-items: center; justify-content: center;
            z-index: 999; transition: opacity 0.5s ease;
        }
    </style>
</head>
