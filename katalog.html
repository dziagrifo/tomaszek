        body { font-family: 'Inter', sans-serif; background-color: var(--dark-bg); color: white; margin: 0; overflow-x: hidden; }

        .nav-line { height: 1px; background: linear-gradient(to right, transparent 0%, rgba(255,255,255,0.1) 50%, transparent 100%); width: 100%; }
        .btn-back { color: white; font-weight: 900; text-transform: uppercase; letter-spacing: 0.2em; font-size: 11px; transition: all 0.4s ease; position: relative; }
        .btn-back:hover { color: var(--gold-light); letter-spacing: 0.3em; }
        .lang-capsule { display: flex; align-items: center; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 99px; padding: 4px 12px; font-size: 11px; font-weight: 900; }
        .catalog-container { max-width: 1280px; margin: 0 auto; }

        .category-card:hover { border-color: var(--gold-dark); transform: translateY(-5px); }
        .category-card img { width: 100%; height: 100%; object-fit: cover; transition: transform 1s ease; filter: brightness(0.6); }
        .card-overlay { background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 60%); position: absolute; inset: 0; display: flex; align-items: flex-end; padding: 25px; }
        #loader { position: fixed; inset: 0; background: #1e1e26; display: flex; align-items: center; justify-content: center; z-index: 999; transition: opacity 0.6s ease; }
    </style>
</head>
