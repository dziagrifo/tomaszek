<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
    
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com; img-src 'self' data:;">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">

    <title>Katalog Produktów | Tomaszek Group</title>
    
    <link rel="canonical" href="https://www.tomaszek.pl/katalog.html">
    <link rel="alternate" hreflang="pl" href="https://www.tomaszek.pl/katalog.html">
    <link rel="alternate" hreflang="en" href="https://www.tomaszek.pl/katalog-en.html">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root { --gold: #d4af37; --gold-light: #f3d97d; --dark-bg: #0f0f11; }
        body { font-family: 'Inter', sans-serif; background: var(--dark-bg); color: white; margin: 0; overflow-x: hidden; }

        /* Та самая линия */
        .premium-line {
            height: 1px;
            background: linear-gradient(to right, transparent, var(--gold), transparent);
            opacity: 0.3;
            width: 100%;
            margin: 2rem 0;
        }

        .glass-header { 
            background: rgba(0,0,0,0.4); 
            backdrop-filter: blur(10px); 
            border-bottom: 1px solid rgba(255,255,255,0.03); 
        }

        .search-box {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(212, 175, 55, 0.2);
            transition: all 0.3s ease;
        }
        .search-box:focus-within {
            border-color: var(--gold);
            background: rgba(255,255,255,0.07);
        }

        .product-card {
            background: #161619;
            border: 1px solid rgba(255,255,255,0.03);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }
        .product-card:hover {
            transform: scale(1.02);
            border-color: var(--gold);
            z-index: 10;
        }
        .product-card img {
            transition: transform 0.8s ease;
            filter: grayscale(100%);
        }
        .product-card:hover img {
            transform: scale(1.1);
            filter: grayscale(0%);
        }

        .logo-gold {
            background: linear-gradient(to bottom, var(--gold-light), var(--gold));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        #loader { position: fixed; inset: 0; background: var(--dark-bg); display: flex; align-items: center; justify-content: center; z-index: 1000; transition: opacity 0.5s ease; }
    </style>
</head>

<body>
    <div id="loader"><div class="text-[#d4af37] text-2xl font-900 italic animate-pulse tracking-widest uppercase">Tomaszek</div></div>

    <header class="glass-header sticky top-0 z-50">
        <div class="max-w-[1600px] mx-auto px-6 md:px-12 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <img src="./img/logo.png" alt="Logo" class="h-8 md:h-12">
                <span class="text-xl md:text-3xl font-900 uppercase italic logo-gold">Tomaszek</span>
            </div>

            <div class="flex items-center space-x-6">
                <div class="search-box hidden md:flex items-center px-4 py-2 rounded-full">
                    <svg class="w-4 h-4 text-[#d4af37] mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="2"/></svg>
                    <input type="text" id="searchInput" placeholder="Szukaj..." class="bg-transparent border-none outline-none text-[12px] italic w-40 lg:w-64">
                </div>
                
                <div class="flex items-center space-x-2 text-[11px] font-900 italic bg-white/5 px-4 py-2 rounded-full border border-white/10">
                    <span class="text-[#d4af37]">PL</span>
                    <span class="opacity-20">|</span>
                    <a href="katalog-en.html" class="opacity-40 hover:opacity-100 transition">EN</a>
                </div>
                <a href="index.html" class="hidden sm:block text-[11px] font-bold uppercase tracking-widest opacity-50 hover:opacity-100 transition">Home</a>
            </div>
        </div>
    </header>

    <main class="max-w-[1600px] mx-auto px-6 md:px-12 py-12">
        <h1 class="text-6xl md:text-9xl font-900 uppercase italic opacity-10 leading-none absolute -z-10 select-none">Catalog</h1>
        <div class="pt-10 md:pt-20">
            <h2 class="text-4xl md:text-6xl font-900 uppercase italic mb-2">Katalog <span class="text-[#d4af37]">Produktów</span></h2>
            <div class="premium-line"></div>
        </div>

        <div id="catalogGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6">
            
            <div class="product-card group" data-name="zabawki toys">
                <div class="p-8">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[#d4af37] font-900 italic text-xl">01</span>
                        <h3 class="text-2xl font-900 uppercase italic group-hover:text-[#d4af37] transition text-right">Zabawki</h3>
                    </div>
                    <div class="aspect-square overflow-hidden bg-black/20">
                        <img src="./img/cat-1.jpg" alt="Zabawki" class="w-full h-full object-cover">
                    </div>
                    <a href="kat-zabawki.html" class="mt-6 inline-block text-[10px] font-bold uppercase tracking-[0.3em] border-b border-[#d4af37]/30 group-hover:border-[#d4af37] transition pb-1">Zobacz więcej</a>
                </div>
            </div>

            <div class="product-card group" data-name="okulary sun glasses">
                <div class="p-8">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[#d4af37] font-900 italic text-xl">02</span>
                        <h3 class="text-2xl font-900 uppercase italic group-hover:text-[#d4af37] transition text-right">Okulary</h3>
                    </div>
                    <div class="aspect-square overflow-hidden bg-black/20">
                        <img src="./img/cat-2.jpg" alt="Okulary" class="w-full h-full object-cover">
                    </div>
                    <a href="kat-okulary.html" class="mt-6 inline-block text-[10px] font-bold uppercase tracking-[0.3em] border-b border-[#d4af37]/30 group-hover:border-[#d4af37] transition pb-1">Zobacz więcej</a>
                </div>
            </div>

            <div class="product-card group" data-name="sezonowe seasonal">
                <div class="p-8">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[#d4af37] font-900 italic text-xl">03</span>
                        <h3 class="text-2xl font-900 uppercase italic group-hover:text-[#d4af37] transition text-right">Sezonowe</h3>
                    </div>
                    <div class="aspect-square overflow-hidden bg-black/20">
                        <img src="./img/cat-3.jpg" alt="Sezonowe" class="w-full h-full object-cover">
                    </div>
                    <a href="kat-sezonowe.html" class="mt-6 inline-block text-[10px] font-bold uppercase tracking-[0.3em] border-b border-[#d4af37]/30 group-hover:border-[#d4af37] transition pb-1">Zobacz więcej</a>
                </div>
            </div>

            <div class="product-card group" data-name="plaża beach summer">
                <div class="p-8">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[#d4af37] font-900 italic text-xl">04</span>
                        <h3 class="text-2xl font-900 uppercase italic group-hover:text-[#d4af37] transition text-right">Plaża</h3>
                    </div>
                    <div class="aspect-square overflow-hidden bg-black/20">
                        <img src="./img/cat-4.jpg" alt="Plaża" class="w-full h-full object-cover">
                    </div>
                    <a href="kat-plaza.html" class="mt-6 inline-block text-[10px] font-bold uppercase tracking-[0.3em] border-b border-[#d4af37]/30 group-hover:border-[#d4af37] transition pb-1">Zobacz więcej</a>
                </div>
            </div>

            <div class="product-card group" data-name="sport fitness">
                <div class="p-8">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[#d4af37] font-900 italic text-xl">05</span>
                        <h3 class="text-2xl font-900 uppercase italic group-hover:text-[#d4af37] transition text-right">Sport</h3>
                    </div>
                    <div class="aspect-square overflow-hidden bg-black/20">
                        <img src="./img/cat-5.jpg" alt="Sport" class="w-full h-full object-cover">
                    </div>
                    <a href="kat-sport.html" class="mt-6 inline-block text-[10px] font-bold uppercase tracking-[0.3em] border-b border-[#d4af37]/30 group-hover:border-[#d4af37] transition pb-1">Zobacz więcej</a>
                </div>
            </div>

            <div class="product-card group" data-name="ogród garden">
                <div class="p-8">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[#d4af37] font-900 italic text-xl">06</span>
                        <h3 class="text-2xl font-900 uppercase italic group-hover:text-[#d4af37] transition text-right">Ogród</h3>
                    </div>
                    <div class="aspect-square overflow-hidden bg-black/20">
                        <img src="./img/cat-6.jpg" alt="Ogród" class="w-full h-full object-cover">
                    </div>
                    <a href="kat-ogrod.html" class="mt-6 inline-block text-[10px] font-bold uppercase tracking-[0.3em] border-b border-[#d4af37]/30 group-hover:border-[#d4af37] transition pb-1">Zobacz więcej</a>
                </div>
            </div>

            <div class="product-card group" data-name="upominki gifts">
                <div class="p-8">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[#d4af37] font-900 italic text-xl">07</span>
                        <h3 class="text-2xl font-900 uppercase italic group-hover:text-[#d4af37] transition text-right">Upominki</h3>
                    </div>
                    <div class="aspect-square overflow-hidden bg-black/20">
                        <img src="./img/cat-7.jpg" alt="Upominki" class="w-full h-full object-cover">
                    </div>
                    <a href="kat-upominki.html" class="mt-6 inline-block text-[10px] font-bold uppercase tracking-[0.3em] border-b border-[#d4af37]/30 group-hover:border-[#d4af37] transition pb-1">Zobacz więcej</a>
                </div>
            </div>

            <div class="product-card group" data-name="nowości news">
                <div class="p-8">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[#d4af37] font-900 italic text-xl">08</span>
                        <h3 class="text-2xl font-900 uppercase italic group-hover:text-[#d4af37] transition text-right">Nowości</h3>
                    </div>
                    <div class="aspect-square overflow-hidden bg-black/20">
                        <img src="./img/cat-8.jpg" alt="Nowości" class="w-full h-full object-cover">
                    </div>
                    <a href="kat-nowosci.html" class="mt-6 inline-block text-[10px] font-bold uppercase tracking-[0.3em] border-b border-[#d4af37]/30 group-hover:border-[#d4af37] transition pb-1">Zobacz więcej</a>
                </div>
            </div>

        </div>
    </main>

    <script>
        window.addEventListener("load", () => {
            const l = document.getElementById("loader");
            setTimeout(() => { l.style.opacity = "0"; setTimeout(() => l.style.display = "none", 500); }, 500);
        });

        const searchInput = document.getElementById('searchInput');
        const cards = document.querySelectorAll('.product-card');

        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            cards.forEach(card => {
                const name = card.getAttribute('data-name').toLowerCase();
                card.style.display = name.includes(term) ? 'block' : 'none';
            });
        });
    </script>
</body>
</html>
