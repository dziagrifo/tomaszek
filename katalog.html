<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
    
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com; img-src 'self' data:;">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">

    <title>Katalog Produktów | Tomaszek Group</title>
    <meta name="description" content="Przeglądaj nasz profesjonalny katalog produktów: zabawki, artykuły sezonowe, okulary. Wysoka jakość dla Twojego biznesu.">
    
    <link rel="canonical" href="https://www.tomaszek.pl/katalog.html">
    <link rel="alternate" hreflang="pl" href="https://www.tomaszek.pl/katalog.html">
    <link rel="alternate" hreflang="en" href="https://www.tomaszek.pl/katalog-en.html">
    <link rel="alternate" hreflang="x-default" href="https://www.tomaszek.pl/katalog.html">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root { --gold: #d4af37; --gold-light: #f3d97d; --dark: #1e1e26; }
        body { font-family: 'Inter', sans-serif; background-color: var(--dark); color: white; margin: 0; }
        
        .logo-text-gold { background: linear-gradient(to bottom, var(--gold-light), var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass-nav { backdrop-filter: blur(15px); background: rgba(0,0,0,0.8); border-bottom: 1px solid rgba(255,255,255,0.05); sticky top: 0; z-index: 100; }
        
        .search-input { background: rgba(255,255,255,0.03); border: 1px solid rgba(212, 175, 55, 0.2); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .search-input:focus { border-color: var(--gold); background: rgba(255,255,255,0.07); outline: none; box-shadow: 0 0 20px rgba(212, 175, 55, 0.1); }
        
        .product-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); transition: all 0.5s ease; overflow: hidden; }
        .product-card:hover { transform: translateY(-10px); border-color: var(--gold); background: rgba(255,255,255,0.05); }
        
        #loader { position: fixed; inset: 0; background: #1e1e26; display: flex; align-items: center; justify-content: center; z-index: 999; transition: opacity 0.6s ease; }
        .loader-text { color: var(--gold); font-size: 24px; letter-spacing: 4px; animation: pulse 1.5s infinite; font-weight: 900; }
        @keyframes pulse { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
    </style>
</head>

<body>
    <div id="loader"><div class="loader-text uppercase italic">Tomaszek</div></div>

    <nav class="glass-nav">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <img src="./img/logo.png" alt="Logo" class="h-10">
                <span class="text-2xl font-900 uppercase italic logo-text-gold tracking-tighter">Tomaszek</span>
            </div>
            <div class="flex items-center space-x-8">
                <div class="flex space-x-2 text-[11px] font-black italic bg-white/5 px-3 py-1 rounded-full border border-white/10">
                    <span class="text-[#d4af37]">PL</span>
                    <span class="opacity-20">|</span>
                    <a href="katalog-en.html" class="opacity-40 hover:opacity-100 transition">EN</a>
                </div>
                <a href="index.html" class="uppercase text-[11px] font-bold tracking-widest opacity-60 hover:opacity-100 transition">Home</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div class="mb-16">
            <h1 class="text-6xl md:text-8xl font-900 italic uppercase mb-6">Katalog</h1>
            <div class="h-1 w-32 bg-[#d4af37] mb-8"></div>
            
            <div class="relative max-w-2xl">
                <input type="text" id="searchInput" placeholder="Szukaj kategorii..." class="search-input w-full p-6 text-white text-lg font-light tracking-wide italic">
                <div class="absolute right-6 top-1/2 -translate-y-1/2 opacity-30">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
            </div>
        </div>

        <div id="catalogGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="product-card group p-8 relative cursor-pointer" data-name="zabawek zabawki toys">
                <p class="text-[10px] uppercase tracking-[0.4em] opacity-40 mb-2">Category 01</p>
                <h3 class="text-3xl font-900 uppercase italic mb-6 group-hover:text-[#d4af37] transition-colors">Zabawki</h3>
                <div class="aspect-square bg-white/5 mb-6 overflow-hidden">
                    <img src="./img/toys.jpg" alt="Zabawki" class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-700">
                </div>
                <a href="produkty-zabawki.html" class="text-[11px] font-900 uppercase tracking-widest border-b border-[#d4af37] pb-1">Zobacz produkty</a>
            </div>

            <div class="product-card group p-8 relative cursor-pointer" data-name="okulary sun glasses">
                <p class="text-[10px] uppercase tracking-[0.4em] opacity-40 mb-2">Category 02</p>
                <h3 class="text-3xl font-900 uppercase italic mb-6 group-hover:text-[#d4af37] transition-colors">Okulary</h3>
                <div class="aspect-square bg-white/5 mb-6 overflow-hidden">
                    <img src="./img/glasses.jpg" alt="Okulary" class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-700">
                </div>
                <a href="produkty-okulary.html" class="text-[11px] font-900 uppercase tracking-widest border-b border-[#d4af37] pb-1">Zobacz produkty</a>
            </div>
        </div>
    </main>

    <script>
        window.addEventListener("load", () => {
            const l = document.getElementById("loader");
            setTimeout(() => { l.style.opacity = "0"; setTimeout(() => l.style.display = "none", 600); }, 400);
        });

        const searchInput = document.getElementById('searchInput');
        const cards = document.querySelectorAll('.product-card');

        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            cards.forEach(card => {
                const name = card.getAttribute('data-name').toLowerCase();
                card.style.display = name.includes(term) ? 'block' : 'none';
            });
        });
    </script>
</body>
</html>
