<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <meta name="robots" content="index, follow">

    <link rel="canonical" href="katalog.html">
    <link rel="alternate" hreflang="pl" href="katalog.html">
    <link rel="alternate" hreflang="en" href="katalog-en.html">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <script src="./js/tailwind.js"></script>

    <style>
        :root {
            --gold-light: #f3d97d;
            --gold-dark: #d4af37;
            --graphite: #232326;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--graphite);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(212, 175, 55, 0.15) 0%, transparent 35%),
                radial-gradient(circle at 100% 100%, rgba(212, 175, 55, 0.1) 0%, transparent 35%);
            color: white;
            margin: 0;
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: url("https://www.transparenttextures.com/patterns/stardust.png");
            opacity: 0.2;
            pointer-events: none;
            z-index: 0;
        }

        .logo-text-gold {
            background: linear-gradient(to bottom, var(--gold-light), var(--gold-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Анимация появления карточек */
        .category-card {
            background: rgba(26, 26, 26, 0.8);
            border: 1px solid rgba(212, 175, 55, 0.1);
            transition: all .5s cubic-bezier(.2, 1, .3, 1);
            position: relative;
            overflow: hidden;
            aspect-ratio: 1/1;
            z-index: 10;
            display: block; /* Ссылка теперь блок */
            opacity: 0;
            transform: translateY(40px);
            animation: fadeUp .8s ease forwards;
        }

        .category-card:nth-child(1) { animation-delay: .1s }
        .category-card:nth-child(2) { animation-delay: .2s }
        .category-card:nth-child(3) { animation-delay: .3s }
        .category-card:nth-child(4) { animation-delay: .4s }
        .category-card:nth-child(5) { animation-delay: .5s }
        .category-card:nth-child(6) { animation-delay: .6s }

        .category-card:hover {
            border-color: var(--gold-dark);
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,.6), 0 0 20px rgba(212,175,55,.2);
        }

        .category-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(.6);
            transition: all .8s ease;
        }

        .category-card:hover img {
            transform: scale(1.1);
            filter: brightness(0.9);
        }

        .card-overlay {
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, transparent 60%);
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 25px;
        }

        .white-line {
            width: 100%;
            height: 1px;
            background: linear-gradient(to right, var(--gold-dark), transparent);
            opacity: .5;
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
