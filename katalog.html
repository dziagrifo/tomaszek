<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
    <title>TOMASZEK | Katalog Produktów</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root { --gold: #d4af37; --dark-bg: #1e1e26; }
        body { font-family: 'Inter', sans-serif; background: var(--dark-bg); margin: 0; color: white; overflow: hidden; }

        .video-container {
            position: fixed; inset: 0; z-index: 0; overflow: hidden; background: var(--dark-bg);
        }
        .video-container video {
            width: 100%; height: 100%; object-fit: cover; opacity: 0.3; filter: grayscale(1);
        }

        .glass-nav { backdrop-filter: blur(15px); background: rgba(0,0,0,0.5); border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        .lang-capsule {
            display: flex; align-items: center; background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 99px;
            padding: 4px 12px; font-size: 11px; font-weight: 900;
        }

        .coming-soon-border {
            border: 1px solid rgba(212, 175, 55, 0.3);
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
        }
    </style>
</head>

<body>

    <div class="video-container">
        <video autoplay muted loop playsinline>
            <source src="./video/promo.mp4" type="video/mp4">
        </video>
    </div>

    <div class="relative z-10 h-screen flex flex-col justify-between">
        
        <nav class="glass-nav">
            <div class="flex justify-between items-center px-4 md:px-16 py-5">
                <a href="index.html" class="flex items-center space-x-2 md:space-x-4">
                    <img src="./img/logo.png" alt="Logo" class="h-9 md:h-16">
                    <span class="text-xl md:text-5xl font-black uppercase italic text-[#d4af37]">Tomaszek</span>
                </a>

                <div class="lang-capsule italic">
                    <span class="text-[#d4af37]">PL</span>
                    <span class="mx-2 opacity-20">|</span>
                    <a href="katalog-en.html" class="opacity-40">EN</a>
                </div>
            </div>
        </nav>

        <main class="flex-grow flex items-center justify-center px-6">
            <div class="coming-soon-border p-10 md:p-20 text-center max-w-2xl">
                <h1 class="text-5xl md:text-8xl font-black uppercase italic mb-6 tracking-tighter">
                    Katalog
                </h1>
                <div class="h-1 w-24 bg-[#d4af37] mx-auto mb-8"></div>
                <p class="text-sm md:text-base uppercase tracking-[0.4em] opacity-70 mb-10">
                    Aktualizacja oferty w toku
                </p>
                <a href="index.html" class="inline-block border border-white/20 px-8 py-3 text-[10px] font-bold uppercase tracking-widest hover:bg-white hover:text-black transition">
                    Powrót do strony głównej
                </a>
            </div>
        </main>

        <footer class="px-6 md:px-16 py-8 text-[9px] font-bold uppercase tracking-[0.5em] opacity-30 text-center">
            © 2026 TOMASZEK GROUP | KATALOG PRODUKTÓW
        </footer>
    </div>

</body>
</html>
