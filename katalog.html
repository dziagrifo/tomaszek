            font-family: 'Inter', sans-serif; background-color: var(--dark-bg);
            color: white; margin: 0; overflow-x: hidden;
        }

        /* Тонкое свечение фона */
        body::before {
            content: ""; position: fixed; inset: 0;
            background-image: radial-gradient(circle at 50% 0%, rgba(212, 175, 55, 0.03) 0%, transparent 50%);
            pointer-events: none; z-index: 0;
        }

        .logo-text-gold {
            background: linear-gradient(to bottom, var(--gold-light), var(--gold-dark));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* Капсула перевода (как на главной) */
        .lang-capsule {
            display: flex; align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 99px; padding: 4px 12px;
            font-size: 11px; font-weight: 900; letter-spacing: 1px;
        }

        /* Контейнер для стабильности сетки */
        .catalog-container {
            max-width: 1280px; 
            margin: 0 auto;
        }

            animation-delay: 0.8s;
        }
