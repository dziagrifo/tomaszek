<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
    
    <title>Katalog Produktów | TOMASZEK GROUP</title>
    <meta name="description" content="Profesjonalny katalog produktów Tomaszek Group. Wybierz jakość и doświadczenie.">
    <meta name="robots" content="index, follow">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root { --gold-light: #f3d97d; --gold-dark: #d4af37; --dark-bg: #1e1e26; }
        
        body { 
            font-family: 'Inter', sans-serif; background-color: var(--dark-bg);
            color: white; margin: 0; overflow-x: hidden;
        }

        .logo-text-gold {
            background: linear-gradient(to bottom, var(--gold-light), var(--gold-dark));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* Идентичная капсула с главной */
        .lang-capsule {
            display: flex; align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 99px; padding: 4px 12px;
            font-size: 11px; font-weight: 900; letter-spacing: 1px;
        }

        /* Ограничиваем размер карточек через контейнер */
        .catalog-container {
            max-width: 1100px; /* Это не даст им стать слишком большими */
            margin: 0 auto;
        }

        .category-card { 
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            position: relative; overflow: hidden; aspect-ratio: 1/1;
        }
        
        .category-card:hover { 
            border-color: var(--gold-dark);
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }

        .category-card img { 
            width: 100%; height: 100%; object-fit: cover; 
            transition: transform 1s ease; filter: brightness(0.6); 
        }

        .category-card:hover img { transform: scale(1.1); filter: brightness(0.9); }

        .card-overlay { 
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 60%); 
            position: absolute; inset: 0; display: flex; align-items: flex-end; padding: 25px; 
        }

        #loader {
            position: fixed; inset: 0; background: #1e1e26;
            display: flex; align-items: center; justify-content: center;
            z-index: 999; transition: opacity 0.6s ease;
        }
    </style>
</head>

<body class="px-6">

    <div id="loader"><div class="text-[#d4af37] text-xl font-900 uppercase italic tracking-[4px] animate-pulse">Tomaszek</div></div>

    <nav class="max-w-7xl mx-auto flex justify-between items-center py-8 border-b border-white/5 relative z-20">
        <a href="index.html" class="flex items-center space-x-3 opacity-40 hover:opacity-100 transition">
            <span class="text-[10px] font-black uppercase tracking-[0.4em]">← Powrót</span>
        </a>
        
        <div class="lang-capsule italic">
            <span class="text-[#d4af37]">PL</span>
            <span class="mx-2 opacity-20">|</span>
            <a href="katalog-en.html" class="opacity-40 hover:opacity-100 transition">EN</a>
        </div>
    </nav>

    <header class="catalog-container mt-16 mb-12 relative z-20">
        <h1 class="text-4xl md:text-5xl font-black uppercase italic tracking-tighter logo-text-gold">
            Katalog
        </h1>
        <div class="h-[1px] w-20 bg-[#d4af37] mt-4"></div>
    </header>

    <main class="catalog-container grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 relative z-20 pb-24">
        
        <div class="category-card"><img src="./img/okulary.jpg"><div class="card-overlay"><h3 class="text-xl font-black uppercase italic">Okulary</h3></div></div>
        
        <div class="category-card"><img src="./img/fejerwerki.jpg"><div class="card-overlay"><h3 class="text-xl font-black uppercase italic">Fejerwerki</h3></div></div>
        
        <div class="category-card"><img src="./img/kaski.jpg"><div class="card-overlay"><h3 class="text-xl font-black uppercase italic">Gogle / Kaski</h3></div></div>
        
        <div class="category-card"><img src="./img/zabawki.jpg"><div class="card-overlay"><h3 class="text-xl font-black uppercase italic">Zabawki</h3></div></div>
        
        <div class="category-card"><img src="./img/plazowe.jpg"><div class="card-overlay"><h3 class="text-xl font-black uppercase italic">Art. Plażowe</h3></div></div>
        
        <div class="category-card"><img src="./img/znicze.jpg"><div class="card-overlay"><h3 class="text-xl font-black uppercase italic">Znicze / Wkłady</h3></div></div>

    </main>

    <footer class="catalog-container py-10 border-t border-white/5 opacity-20 text-[8px] font-bold uppercase tracking-[0.6em] flex justify-between">
        <span>TOMASZEK GROUP © 2026</span>
        <span class="italic">Katalog Produktów</span>
    </footer>

    <script>
        window.addEventListener("load", () => {
            const l = document.getElementById("loader");
            setTimeout(() => {
                l.style.opacity = "0";
                setTimeout(() => l.style.display = "none", 600);
            }, 300);
        });
    </script>
</body>
</html>
