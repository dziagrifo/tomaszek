<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
    
    <title>Katalog | Produkty</title>
    <meta name="description" content="Katalog produktów: zabawki, okulary, artykuły sezonowe.">
    <meta name="robots" content="index, follow">

    <link rel="canonical" href="https://www.tomaszek.pl/katalog.html">
    <link rel="alternate" hreflang="pl" href="https://www.tomaszek.pl/katalog.html">
    <link rel="alternate" hreflang="en" href="https://www.tomaszek.pl/katalog-en.html">
    <link rel="alternate" hreflang="x-default" href="https://www.tomaszek.pl/katalog.html">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root { --gold-light: #f3d97d; --gold-dark: #d4af37; --dark-bg: #1e1e26; }
        body { font-family: 'Inter', sans-serif; background-color: var(--dark-bg); color: white; margin: 0; overflow-x: hidden; }
        .logo-text-gold { background: linear-gradient(to bottom, var(--gold-light), var(--gold-dark)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-line { height: 1px; background: linear-gradient(to right, transparent 0%, rgba(255,255,255,0.05) 50%, transparent 100%); width: 100%; }
        .btn-back { color: white; font-weight: 900; text-transform: uppercase; letter-spacing: 0.2em; font-size: 11px; transition: all 0.4s ease; }
        .btn-back:hover { color: var(--gold-light); }
        .lang-capsule { display: flex; align-items: center; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 99px; padding: 4px 12px; font-size: 10px; font-weight: 900; }
        .catalog-container { max-width: 1200px; margin: 0 auto; }
        
        .search-input {
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            color: white;
            padding: 15px 0;
            width: 100%;
            max-width: 300px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            outline: none;
            transition: all 0.4s ease;
        }
        .search-input:focus { border-bottom-color: var(--gold-dark); width: 100%; max-width: 400px; }

        .category-card { background: rgba(255, 255, 255, 0.01); border: 1px solid rgba(255, 255, 255, 0.03); transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); position: relative; overflow: hidden; aspect-ratio: 1/1; display: block; }
        .category-card:hover { border-color: rgba(212, 175, 55, 0.5); transform: scale(1.02); }
        .category-card img { width: 100%; height: 100%; object-fit: cover; transition: transform 1.2s ease; filter: brightness(0.5) grayscale(0.2); }
        .category-card:hover img { transform: scale(1.1); filter: brightness(0.7) grayscale(0); }
        .card-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        
        #loader { position: fixed; inset: 0; background: #1e1e26; display: flex; align-items: center; justify-content: center; z-index: 999; }
    </style>
</head>

<body class="px-6">
    <div id="loader"><div class="text-[#d4af37]/20 text-xs font-900 uppercase tracking-[10px] animate-pulse italic">Katalog</div></div>

    <nav class="max-w-7xl mx-auto relative z-20">
        <div class="flex justify-between items-center py-8">
            <a href="index.html" class="btn-back">← <span>Powróт</span></a>
            <div class="lang-capsule italic text-white/30">
                <span class="text-[#d4af37]">PL</span>
                <span class="mx-2 opacity-10">|</span>
                <a href="katalog-en.html" class="hover:text-white transition">EN</a>
            </div>
        </div>
        <div class="nav-line"></div>
    </nav>

    <header class="catalog-container mt-20 mb-16 relative z-20">
        <h1 class="text-5xl md:text-7xl font-black uppercase italic tracking-tighter logo-text-gold mb-10">
            Katalog
        </h1>
        
        <input type="text" id="searchInput" placeholder="Szukaj..." class="search-input">
    </header>

    <main id="catalogGrid" class="catalog-container grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4 relative z-20 pb-32">
        <a href="okulary.html" class="category-card" data-keywords="okulary sun glasses lato"><img src="./img/okulary.jpg" alt="Okulary"><div class="card-overlay"><h3 class="text-xl font-black uppercase italic tracking-widest">Okulary</h3></div></a>
        <a href="fejerwerki.html" class="category-card" data-keywords="fajerwerki petardy pirotechnika"><img src="./img/fejerwerki.jpg" alt="Fejerwerki"><div class="card-overlay"><h3 class="text-xl font-black uppercase italic tracking-widest">Fejerwerki</h3></div></a>
        <a href="kaski.html" class="category-card" data-keywords="kaski gogle narty zima"><img src="./img/kaski.jpg" alt="Kaski"><div class="card-overlay"><h3 class="text-xl font-black uppercase italic tracking-widest">Gogle / Kaski</h3></div></a>
        <a href="zabawki.html" class="category-card" data-keywords="zabawki dzieci toy kids"><img src="./img/zabawki.jpg" alt="Zabawki"><div class="card-overlay"><h3 class="text-xl font-black uppercase italic tracking-widest">Zabawki</h3></div></a>
        <a href="plazowe.html" class="category-card" data-keywords="plaża woda basen lato"><img src="./img/plazowe.jpg" alt="Artykuły plażowe"><div class="card-overlay"><h3 class="text-xl font-black uppercase italic tracking-widest">Art. Plażowe</h3></div></a>
        <a href="znicze.html" class="category-card" data-keywords="znicze wkłady cmentarz"><img src="./img/znicze.jpg" alt="Znicze"><div class="card-overlay"><h3 class="text-xl font-black uppercase italic tracking-widest">Znicze</h3></div></a>
        <a href="samochody.html" class="category-card" data-keywords="auta samochody modele"><img src="./img/samochody.jpg" alt="Samochody"><div class="card-overlay"><h3 class="text-xl font-black uppercase italic tracking-widest">Samochody</h3></div></a>
        <a href="rekawy.html" class="category-card" data-keywords="rękawy rekiny pływanie woda"><img src="./img/rekawy.jpg" alt="Rękawy"><div class="card-overlay"><h3 class="text-xl font-black uppercase italic tracking-widest">Rękawy</h3></div></a>
    </main>

    <footer class="catalog-container py-10 opacity-10 text-[8px] font-bold uppercase tracking-[0.5em] flex justify-between">
        <span>TOMASZEK © 2026</span>
        <span>Katalog Produktów</span>
    </footer>

    <script>
        window.addEventListener("load", () => {
            const l = document.getElementById("loader");
            setTimeout(() => { l.style.opacity = "0"; setTimeout(() => l.style.display = "none", 600); }, 300);
        });

        const searchInput = document.getElementById('searchInput');
        const cards = document.querySelectorAll('.category-card');

        searchInput.addEventListener('input', (e) => {
            const filter = e.target.value.toLowerCase();
            cards.forEach(card => {
                const title = card.querySelector('h3').innerText.toLowerCase();
                const keywords = card.getAttribute('data-keywords').toLowerCase();
                if (title.includes(filter) || keywords.includes(filter)) {
                    card.style.display = "block";
                } else {
                    card.style.display = "none";
                }
            });
        });
    </script>
</body>
</html>
