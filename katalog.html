<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
    
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com; img-src 'self' data:; video-src 'self';">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">

    <title>Katalog Produktów | Tomaszek Group</title>
    
    <link rel="canonical" href="https://www.tomaszek.pl/katalog.html">
    <link rel="alternate" hreflang="pl" href="https://www.tomaszek.pl/katalog.html">
    <link rel="alternate" hreflang="en" href="https://www.tomaszek.pl/katalog-en.html">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root { --gold: #d4af37; --gold-light: #f3d97d; --dark-bg: #121214; }
        body { font-family: 'Inter', sans-serif; background: var(--dark-bg); color: white; margin: 0; }

        /* Премиальная линия под заголовком */
        .header-line {
            height: 2px;
            background: linear-gradient(to right, var(--gold) 0%, transparent 100%);
            width: 100%;
            margin-top: 1rem;
            margin-bottom: 3rem;
        }

        .glass-nav { backdrop-filter: blur(20px); background: rgba(0,0,0,0.8); border-bottom: 1px solid rgba(255,255,255,0.05); position: sticky; top: 0; z-index: 100; }
        
        /* Поиск */
        .search-container {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(212, 175, 55, 0.1);
            transition: all 0.4s ease;
        }
        .search-container:focus-within {
            border-color: var(--gold);
            background: rgba(255,255,255,0.05);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.05);
        }

        /* Карточки товаров */
        .product-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.03);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .product-card:hover {
            border-color: var(--gold);
            background: rgba(255,255,255,0.05);
            transform: translateY(-10px);
        }
        
        .logo-text-gold {
            background: linear-gradient(to bottom, var(--gold-light), var(--gold));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        #loader { position: fixed; inset: 0; background: #121214; display: flex; align-items: center; justify-content: center; z-index: 999; transition: opacity 0.8s ease; }
    </style>
</head>

<body>
    <div id="loader"><div class="text-[#d4af37] text-2xl font-900 uppercase italic tracking-[0.3em] animate-pulse">Tomaszek</div></div>

    <nav class="glass-nav">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <img src="./img/logo.png" alt="Logo" class="h-10">
                <span class="text-2xl font-900 uppercase italic logo-text-gold tracking-tighter">Tomaszek</span>
            </div>
            <div class="flex items-center space-x-8">
                <div class="flex space-x-2 text-[11px] font-black italic bg-white/5 px-3 py-1 rounded-full border border-white/10">
                    <span class="text-[#d4af37]">PL</span>
                    <span class="opacity-20">|</span>
                    <a href="katalog-en.html" class="opacity-40 hover:opacity-100 transition">EN</a>
                </div>
                <a href="index.html" class="uppercase text-[11px] font-bold tracking-widest opacity-60 hover:opacity-100 transition">Home</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-16">
        <header class="mb-12">
            <h1 class="text-6xl md:text-8xl font-900 uppercase italic leading-none">Katalog</h1>
            <div class="header-line"></div>
            
            <div class="search-container flex items-center p-2 rounded-sm max-w-xl">
                <div class="pl-4 opacity-30">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </div>
                <input type="text" id="searchInput" placeholder="Szukaj w kategoriach..." class="bg-transparent border-none w-full p-4 text-white placeholder-white/20 focus:outline-none font-light italic">
            </div>
        </header>

        <div id="catalogGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            
            <div class="product-card group p-6" data-name="zabawki toys">
                <span class="text-[10px] text-[#d4af37] font-bold tracking-widest">01</span>
                <h3 class="text-xl font-900 uppercase italic mt-2 mb-6 group-hover:text-[#d4af37] transition">Zabawki</h3>
                <div class="aspect-[4/5] bg-black/40 overflow-hidden mb-6">
                    <img src="./img/cat-1.jpg" alt="Zabawki" class="w-full h-full object-cover opacity-50 group-hover:opacity-100 group-hover:scale-110 transition duration-700">
                </div>
                <a href="kat-zabawki.html" class="text-[10px] font-bold uppercase tracking-widest border-b border-[#d4af37] pb-1">Odkryj kolekcję</a>
            </div>

            <div class="product-card group p-6" data-name="okulary sun glasses">
                <span class="text-[10px] text-[#d4af37] font-bold tracking-widest">02</span>
                <h3 class="text-xl font-900 uppercase italic mt-2 mb-6 group-hover:text-[#d4af37] transition">Okulary</h3>
                <div class="aspect-[4/5] bg-black/40 overflow-hidden mb-6">
                    <img src="./img/cat-2.jpg" alt="Okulary" class="w-full h-full object-cover opacity-50 group-hover:opacity-100 group-hover:scale-110 transition duration-700">
                </div>
                <a href="kat-okulary.html" class="text-[10px] font-bold uppercase tracking-widest border-b border-[#d4af37] pb-1">Odkryj kolekcję</a>
            </div>

            <div class="product-card group p-6" data-name="sezonowe seasonal">
                <span class="text-[10px] text-[#d4af37] font-bold tracking-widest">03</span>
                <h3 class="text-xl font-900 uppercase italic mt-2 mb-6 group-hover:text-[#d4af37] transition">Sezonowe</h3>
                <div class="aspect-[4/5] bg-black/40 overflow-hidden mb-6">
                    <img src="./img/cat-3.jpg" alt="Sezonowe" class="w-full h-full object-cover opacity-50 group-hover:opacity-100 group-hover:scale-110 transition duration-700">
                </div>
                <a href="kat-sezonowe.html" class="text-[10px] font-bold uppercase tracking-widest border-b border-[#d4af37] pb-1">Odkryj kolekcję</a>
            </div>

            <div class="product-card group p-6" data-name="plaża beach summer">
                <span class="text-[10px] text-[#d4af37] font-bold tracking-widest">04</span>
                <h3 class="text-xl font-900 uppercase italic mt-2 mb-6 group-hover:text-[#d4af37] transition">Plaża</h3>
                <div class="aspect-[4/5] bg-black/40 overflow-hidden mb-6">
                    <img src="./img/cat-4.jpg" alt="Plaża" class="w-full h-full object-cover opacity-50 group-hover:opacity-100 group-hover:scale-110 transition duration-700">
                </div>
                <a href="kat-plaza.html" class="text-[10px] font-bold uppercase tracking-widest border-b border-[#d4af37] pb-1">Odkryj kolekcję</a>
            </div>

            <div class="product-card group p-6" data-name="sport fitness">
                <span class="text-[10px] text-[#d4af37] font-bold tracking-widest">05</span>
                <h3 class="text-xl font-900 uppercase italic mt-2 mb-6 group-hover:text-[#d4af37] transition">Sport</h3>
                <div class="aspect-[4/5] bg-black/40 overflow-hidden mb-6">
                    <img src="./img/cat-5.jpg" alt="Sport" class="w-full h-full object-cover opacity-50 group-hover:opacity-100 group-hover:scale-110 transition duration-700">
                </div>
                <a href="kat-sport.html" class="text-[10px] font-bold uppercase tracking-widest border-b border-[#d4af37] pb-1">Odkryj kolekcję</a>
            </div>

            <div class="product-card group p-6" data-name="ogród garden">
                <span class="text-[10px] text-[#d4af37] font-bold tracking-widest">06</span>
                <h3 class="text-xl font-900 uppercase italic mt-2 mb-6 group-hover:text-[#d4af37] transition">Ogród</h3>
                <div class="aspect-[4/5] bg-black/40 overflow-hidden mb-6">
                    <img src="./img/cat-6.jpg" alt="Ogród" class="w-full h-full object-cover opacity-50 group-hover:opacity-100 group-hover:scale-110 transition duration-700">
                </div>
                <a href="kat-ogrod.html" class="text-[10px] font-bold uppercase tracking-widest border-b border-[#d4af37] pb-1">Odkryj kolekcję</a>
            </div>

            <div class="product-card group p-6" data-name="upominki gifts">
                <span class="text-[10px] text-[#d4af37] font-bold tracking-widest">07</span>
                <h3 class="text-xl font-900 uppercase italic mt-2 mb-6 group-hover:text-[#d4af37] transition">Upominki</h3>
                <div class="aspect-[4/5] bg-black/40 overflow-hidden mb-6">
                    <img src="./img/cat-7.jpg" alt="Upominki" class="w-full h-full object-cover opacity-50 group-hover:opacity-100 group-hover:scale-110 transition duration-700">
                </div>
                <a href="kat-upominki.html" class="text-[10px] font-bold uppercase tracking-widest border-b border-[#d4af37] pb-1">Odkryj kolekcję</a>
            </div>

            <div class="product-card group p-6" data-name="nowości new">
                <span class="text-[10px] text-[#d4af37] font-bold tracking-widest">08</span>
                <h3 class="text-xl font-900 uppercase italic mt-2 mb-6 group-hover:text-[#d4af37] transition">Nowości</h3>
                <div class="aspect-[4/5] bg-black/40 overflow-hidden mb-6">
                    <img src="./img/cat-8.jpg" alt="Nowości" class="w-full h-full object-cover opacity-50 group-hover:opacity-100 group-hover:scale-110 transition duration-700">
                </div>
                <a href="kat-nowosci.html" class="text-[10px] font-bold uppercase tracking-widest border-b border-[#d4af37] pb-1">Odkryj kolekcję</a>
            </div>

        </div>
    </main>

    <script>
        // Loader logic
        window.addEventListener("load", () => {
            const l = document.getElementById("loader");
            setTimeout(() => { l.style.opacity = "0"; setTimeout(() => l.style.display = "none", 800); }, 500);
        });

        // Search logic
        const searchInput = document.getElementById('searchInput');
        const cards = document.querySelectorAll('.product-card');

        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            cards.forEach(card => {
                const name = card.getAttribute('data-name').toLowerCase();
                if(name.includes(term)) {
                    card.style.display = 'block';
                    card.style.opacity = '1';
                } else {
                    card.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
