<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
    <title>KATALOG | TOMASZEK - Profesjonalna Dystrybucja</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root { --gold-light: #f3d97d; --gold-dark: #d4af37; --dark-bg: #1e1e26; }
        
        body { 
            font-family: 'Inter', sans-serif; background-color: var(--dark-bg);
            color: white; margin: 0; overflow-x: hidden;
        }

        /* Эффект шума и свечения как на главной */
        body::before {
            content: ""; position: fixed; inset: 0;
            background-image: radial-gradient(circle at 20% 30%, rgba(212, 175, 55, 0.05) 0%, transparent 40%),
                              radial-gradient(circle at 80% 70%, rgba(212, 175, 55, 0.05) 0%, transparent 40%);
            pointer-events: none; z-index: 0;
        }

        .logo-text-gold {
            background: linear-gradient(to bottom, var(--gold-light), var(--gold-dark));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* Премиальная капсула перевода */
        .lang-capsule {
            display: flex; align-items: center;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 99px; padding: 4px 12px;
            font-size: 11px; font-weight: 900; letter-spacing: 1px;
            transition: all 0.3s ease;
        }
        .lang-capsule:hover { border-color: var(--gold-dark); background: rgba(255, 255, 255, 0.12); }

        /* Улучшенные карточки */
        .category-card { 
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative; overflow: hidden; aspect-ratio: 1/1; z-index: 10;
        }
        
        .category-card:hover { 
            border-color: var(--gold-dark);
            transform: translateY(-10px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .category-card img { 
            width: 100%; height: 100%; object-fit: cover; 
            transition: transform 1.2s ease, filter 0.8s ease; 
            filter: brightness(0.5) grayscale(0.2); 
        }

        .category-card:hover img { transform: scale(1.1); filter: brightness(0.8) grayscale(0); }

        .card-overlay { 
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, transparent 60%); 
            position: absolute; inset: 0; display: flex; flex-direction: column; 
            justify-content: flex-end; padding: 30px; 
        }
