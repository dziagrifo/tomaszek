 <!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
    
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com; img-src 'self' data:; video-src 'self';">
    <meta http-equiv="X-Frame-Options" content="DENY">

    <title>Tomaszek Group | Professional Distribution</title>
    <meta name="description" content="Leading distributor of toys, sunglasses and seasonal goods.">
    
    <link rel="canonical" href="https://www.tomaszek.pl/index-en.html">
    <link rel="alternate" hreflang="pl" href="https://www.tomaszek.pl/index.html">
    <link rel="alternate" hreflang="en" href="https://www.tomaszek.pl/index-en.html">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root { --gold-light: #f3d97d; --gold-dark: #d4af37; --dark-bg: #1e1e26; }
        body { font-family: 'Inter', sans-serif; background: var(--dark-bg); margin: 0; overflow-x: hidden; }

        .video-container { position: fixed; inset: 0; z-index: 0; overflow: hidden; background: var(--dark-bg); }
        .video-container video { width: 100%; height: 100%; object-fit: cover; opacity: 0.4; }

        .logo-text-gold {
            background: linear-gradient(to bottom, var(--gold-light), var(--gold-dark));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        #loader {
            position: fixed; inset: 0; background: #1e1e26;
            display: flex; align-items: center; justify-content: center;
            z-index: 999; transition: opacity 0.6s ease;
        }

        .loader-text { color: #d4af37; font-size: 24px; letter-spacing: 4px; animation: pulse 1.5s infinite; font-weight: 900; }
        @keyframes pulse { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

        .glass-nav { backdrop-filter: blur(15px); background: rgba(0,0,0,0.6); border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        #mobile-menu { transition: all 0.3s ease-in-out; max-height: 0; overflow: hidden; }
        #mobile-menu.open { max-height: 250px; padding: 20px 0; }
    </style>
</head>

<body>

    <div id="loader"><div class="loader-text uppercase italic">Tomaszek</div></div>

    <div class="video-container">
        <video autoplay muted loop playsinline poster="./img/fallback.jpg">
            <source src="./video/promo.mp4" type="video/mp4">
        </video>
    </div>

    <div class="relative z-10 h-screen flex flex-col justify-between text-white">
        
        <nav class="glass-nav relative z-[100]">
            <div class="flex justify-between items-center px-4 md:px-16 py-4">
                
                <div class="flex items-center space-x-2 md:space-x-4">
                    <img src="./img/logo.png" alt="Logo" class="h-8 md:h-16">
                    <span class="text-xl md:text-5xl font-black uppercase italic logo-text-gold tracking-tighter">Tomaszek</span>
                </div>

                <div class="flex items-center space-x-4 md:space-x-12">
                    
                    <div class="flex space-x-2 text-[11px] md:text-[13px] font-black italic bg-white/5 px-3 py-1 rounded-full border border-white/10">
                        <a href="index.html" class="opacity-40 hover:opacity-100 transition">PL</a>
                        <span class="opacity-20">|</span>
                        <span class="text-[#d4af37]">EN</span>
                    </div>

                    <div class="hidden md:flex items-center space-x-10 uppercase text-[11px] font-bold tracking-[0.2em]">
                        <a href="about-en.html" class="hover:text-[#d4af37] transition">About Us</a>
                        <a href="contact-en.html" class="hover:text-[#d4af37] transition">Contact</a>
                    </div>

                    <button id="menu-btn" class="md:hidden text-white">
                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>
                        </svg>
                    </button>
                </div>
            </div>

            <div id="mobile-menu" class="md:hidden bg-black/90 backdrop-blur-lg border-t border-white/5">
                <div class="flex flex-col items-center space-y-6 uppercase text-sm font-bold tracking-widest">
                    <a href="about-en.html" class="hover:text-[#d4af37] transition">About Us</a>
                    <a href="contact-en.html" class="hover:text-[#d4af37] transition">Contact</a>
                </div>
            </div>
        </nav>

        <main class="px-6 md:px-16 flex flex-col justify-center flex-grow">
            <div class="max-w-4xl">
                <h1 class="text-3xl md:text-7xl font-black max-w-4xl leading-tight mb-10 border-l-[10px] md:border-l-[15px] border-[#d4af37] pl-6 md:pl-10 uppercase italic">
                    PROFESSIONALISM<br>AND EXPERIENCE
                </h1>
                
                <a href="katalog-en.html" class="inline-block bg-[#d4af37] text-black px-10 md:px-14 py-4 md:py-6 font-black uppercase tracking-widest text-base md:text-xl hover:bg-[#f3d97d] transition transform hover:scale-105 shadow-2xl">
                    Open Catalog
                </a>
            </div>
        </main>

        <footer class="px-6 md:px-16 py-6 text-[9px] font-bold uppercase tracking-[0.5em] opacity-40 flex justify-between items-center">
            <span>© 2026 TOMASZEK GROUP POLAND</span>
            <span class="italic text-right">Excellence in Distribution</span>
        </footer>
    </div>

    <script>
        window.addEventListener("load", () => {
            const l = document.getElementById("loader");
            setTimeout(() => { l.style.opacity = "0"; setTimeout(() => l.style.display = "none", 600); }, 400);
        });

        const btn = document.getElementById("menu-btn");
        const mobileMenu = document.getElementById("mobile-menu");
        btn.addEventListener("click", () => { mobileMenu.classList.toggle("open"); });
    </script>
</body>
</html>
