<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog | TOMASZEK</title>
    
    <meta name="description" content="Katalog produktów TOMASZEK - Okulary, Zabawki, Artykuły sezonowe. Najwyższa jakość и profesjonalizm.">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com; img-src 'self' data: https://www.transparenttextures.com;">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold-light: #f3d97d; --gold-dark: #d4af37; --graphite: #232326; }
        
        body { 
            font-family: 'Inter', sans-serif; background-color: var(--graphite);
            background-image: radial-gradient(circle at 0% 0%, rgba(212, 175, 55, 0.15) 0%, transparent 35%), 
                              radial-gradient(circle at 100% 100%, rgba(212, 175, 55, 0.1) 0%, transparent 35%);
            color: white; margin: 0; min-height: 100vh; position: relative;
        }

        body::before {
            content: ""; position: fixed; inset: 0;
            background-image: url("https://www.transparenttextures.com/patterns/stardust.png");
            opacity: 0.2; pointer-events: none; z-index: 0;
        }

        .logo-text-gold {
            background: linear-gradient(to bottom, var(--gold-light), var(--gold-dark));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* 1. ЛИНИЯ: Плавный переход в фон */
        .premium-line-fade {
            width: 100%; height: 1px;
            background: linear-gradient(to right, var(--gold-dark) 0%, rgba(212, 175, 55, 0.5) 30%, var(--graphite) 100%);
            opacity: 0.8;
        }

        /* 2. PL EN BUBBLE (Как на фото) */
        .lang-pill {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 50px; padding: 6px 22px;
            display: flex; align-items: center; gap: 10px;
        }
        .lang-active { color: var(--gold-dark); font-weight: 900; font-style: italic; font-size: 13px; }
        .lang-sep { color: rgba(255, 255, 255, 0.15); font-weight: 300; transform: skewX(-15deg); }
        .lang-link { color: rgba(255, 255, 255, 0.4); font-weight: 900; font-style: italic; font-size: 13px; transition: 0.3s; }
        .lang-link:hover { color: white; }

        /* 3. SEARCH */
        .search-container input {
            background: transparent; border: none; border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            color: white; font-size: 10px; font-weight: 700; letter-spacing: 2px;
            outline: none; transition: 0.4s; width: 100px;
        }
        .search-container input:focus { width: 160px; border-color: var(--gold-dark); }

        /* 4. КАРТОЧКИ (Сетка 4 в ряд) */
        .category-card { 
            background: rgba(26, 26, 26, 0.8);
            border: 1px solid rgba(212, 175, 55, 0.1);
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            position: relative; overflow: hidden; aspect-ratio: 1/1; z-index: 10;
        }
        .category-card:hover { 
            border-color: var(--gold-dark); transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        .category-card img { 
            width: 100%; height: 100%; object-fit: cover;
            transition: all 0.8s ease; filter: brightness(0.8); /* ЦВЕТНЫЕ */
        }
        .category-card:hover img { transform: scale(1.1); filter: brightness(1); }

        .card-overlay { 
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 70%); 
            position: absolute; inset: 0; display: flex; flex-direction: column; 
            justify-content: flex-end; padding: 20px; 
        }
    </style>
</head>

<body class="p-6 md:px-16 md:py-10">
    <nav class="flex justify-between items-center mb-16 border-b border-white/5 pb-6 relative z-20">
        <a href="index.html" class="text-[10px] uppercase tracking-[0.4em] opacity-40 hover:opacity-100 transition">← Powrót</a>
        
        <div class="flex items-center space-x-8">
            <div class="search-container hidden md:block">
                <input type="text" id="catSearch" placeholder="SZUKAJ...">
            </div>
            <div class="lang-pill">
                <span class="lang-active uppercase">PL</span>
                <span class="lang-sep">|</span>
                <a href="katalog-en.html" class="lang-link uppercase">EN</a>
            </div>
        </div>
    </nav>

    <header class="mb-20 inline-block relative z-20 w-full">
        <h1 class="text-5xl md:text-7xl font-black uppercase italic tracking-tighter mb-2 logo-text-gold">KATALOG</h1>
        <div class="premium-line-fade"></div>
    </header>

    <div id="catalogGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 relative z-20">
        
        <a href="kat-okulary.html" class="category-card" data-name="okulary">
            <img src="./img/okulary.jpg" alt="Okulary">
            <div class="card-overlay"><h3 class="text-xl font-black uppercase italic">Okulary</h3></div>
        </a>

        <a href="kat-fejerwerki.html" class="category-card" data-name="fejerwerki">
            <img src="./img/fejerwerki.jpg" alt="Fejerwerki">
            <div class="card-overlay"><h3 class="text-xl font-black uppercase italic">Fejerwerki</h3></div>
        </a>

        <a href="kat-kaski.html" class="category-card" data-name="gogle kaski">
            <img src="./img/kaski.jpg" alt="Kaski">
            <div class="card-overlay"><h3 class="text-xl font-black uppercase italic">Gogle / Kaski</h3></div>
        </a>

        <a href="kat-zabawki.html" class="category-card" data-name="zabawki">
            <img src="./img/zabawki.jpg" alt="Zabawki">
            <div class="card-overlay"><h3 class="text-xl font-black uppercase italic">Zabawki</h3></div>
        </a>

        <a href="kat-plazowe.html" class="category-card" data-name="art. plazowe">
            <img src="./img/plazowe.jpg" alt="Plażowe">
            <div class="card-overlay"><h3 class="text-xl font-black uppercase italic">Art. Plażowe</h3></div>
        </a>

        <a href="kat-znicze.html" class="category-card" data-name="znicze wklady">
            <img src="./img/znicze.jpg" alt="Znicze">
            <div class="card-overlay"><h3 class="text-xl font-black uppercase italic">Znicze / Wkłady</h3></div>
        </a>

        <a href="kat-nowy1.html" class="category-card" data-name="nowość 1">
            <img src="./img/placeholder1.jpg" alt="Nowość 1">
            <div class="card-overlay"><h3 class="text-xl font-black uppercase italic">Nowość 1</h3></div>
        </a>

        <a href="kat-nowy2.html" class="category-card" data-name="nowość 2">
            <img src="./img/placeholder2.jpg" alt="Nowość 2">
            <div class="card-overlay"><h3 class="text-xl font-black uppercase italic">Nowość 2</h3></div>
        </a>

    </div>

    <script>
        // SEO-friendly Instant Search
        const searchInput = document.getElementById('catSearch');
        const cards = document.querySelectorAll('.category-card');

        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            cards.forEach(card => {
                const name = card.getAttribute('data-name').toLowerCase();
                card.style.display = name.includes(term) ? 'block' : 'none';
            });
        });
    </script>
</body>
</html>
