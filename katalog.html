<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
    
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com; img-src 'self' data:;">
    <meta http-equiv="X-Frame-Options" content="DENY">

    <title>Katalog | Tomaszek Group</title>
    
    <link rel="canonical" href="https://www.tomaszek.pl/katalog.html">
    <link rel="alternate" hreflang="pl" href="https://www.tomaszek.pl/katalog.html">
    <link rel="alternate" hreflang="en" href="https://www.tomaszek.pl/katalog-en.html">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root { --gold: #d4af37; --gold-light: #f3d97d; --bg: #0b0b0c; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; overflow-x: hidden; }

        .premium-line {
            height: 1px;
            background: linear-gradient(to right, var(--gold) 0%, transparent 100%);
            width: 100%;
            margin-top: 1.5rem;
            opacity: 0.4;
        }

        .search-under-lang {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(212, 175, 55, 0.1);
            transition: all 0.3s ease;
        }
        .search-under-lang:focus-within { border-color: var(--gold); background: rgba(255,255,255,0.08); }

        /* Квадраты из истории */
        .cat-cube {
            background: #111113;
            aspect-ratio: 1 / 1;
            border: 1px solid rgba(255,255,255,0.03);
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 2rem;
            position: relative;
            overflow: hidden;
            text-decoration: none;
        }
        .cat-cube:hover { border-color: var(--gold); transform: translateY(-5px); }
        .cat-cube img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.3;
            transition: all 0.7s ease;
            filter: grayscale(100%);
            z-index: 0;
        }
        .cat-cube:hover img { opacity: 0.6; filter: grayscale(0%); transform: scale(1.1); }
        .cat-title { position: relative; z-index: 10; font-weight: 900; text-transform: uppercase; font-style: italic; font-size: 1.5rem; letter-spacing: -0.05em; }

        #loader { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; transition: opacity 0.4s ease; }
    </style>
</head>

<body>
    <div id="loader"><div class="text-[#d4af37] text-xl font-900 italic tracking-[0.5em] animate-pulse">TOMASZEK</div></div>

    <header class="px-6 md:px-12 py-6">
        <div class="max-w-[1800px] mx-auto flex justify-between items-start">
            <a href="index.html" class="group flex items-center space-x-3 text-[11px] font-bold uppercase tracking-[0.3em] opacity-50 hover:opacity-100 transition">
                <svg class="w-5 h-5 transform group-hover:-translate-x-2 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10 19l-7-7m0 0l7-7m-7 7h18" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                <span>Powrót</span>
            </a>

            <div class="flex flex-col items-end space-y-4">
                <div class="flex items-center space-x-4">
                    <div class="search-under-lang flex items-center px-4 py-2 rounded-full">
                        <input type="text" id="searchInput" placeholder="SZUKAJ..." class="bg-transparent border-none outline-none text-[10px] font-bold tracking-widest w-32 md:w-48 text-white">
                        <svg class="w-4 h-4 text-[#d4af37]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="2"/></svg>
                    </div>
                    <div class="flex items-center space-x-2 text-[11px] font-900 italic bg-white/5 px-4 py-2 rounded-full border border-white/10">
                        <span class="text-[#d4af37]">PL</span>
                        <span class="opacity-20">|</span>
                        <a href="katalog-en.html" class="opacity-40 hover:opacity-100 transition">EN</a>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-[1800px] mx-auto px-6 md:px-12 pb-20">
        <div class="mb-12">
            <h1 class="text-6xl md:text-8xl font-900 uppercase italic leading-none">Katalog</h1>
            <div class="premium-line"></div>
        </div>

        <div id="catalogGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
            
            <a href="kat-zabawki.html" class="cat-cube group" data-name="zabawki toys">
                <img src="./img/zabawki.jpg" alt="">
                <span class="text-[#d4af37] text-xs font-bold mb-2 z-10">01</span>
                <span class="cat-title group-hover:text-[#d4af37] transition">Zabawki</span>
            </a>

            <a href="kat-okulary.html" class="cat-cube group" data-name="okulary sun glasses">
                <img src="./img/okulary.jpg" alt="">
                <span class="text-[#d4af37] text-xs font-bold mb-2 z-10">02</span>
                <span class="cat-title group-hover:text-[#d4af37] transition">Okulary</span>
            </a>

            <a href="kat-sezonowe.html" class="cat-cube group" data-name="sezonowe seasonal">
                <img src="./img/sezonowe.jpg" alt="">
                <span class="text-[#d4af37] text-xs font-bold mb-2 z-10">03</span>
                <span class="cat-title group-hover:text-[#d4af37] transition">Sezonowe</span>
            </a>

            <a href="kat-plaza.html" class="cat-cube group" data-name="plaża beach summer">
                <img src="./img/plaza.jpg" alt="">
                <span class="text-[#d4af37] text-xs font-bold mb-2 z-10">04</span>
                <span class="cat-title group-hover:text-[#d4af37] transition">Plaża</span>
            </a>

            <a href="kat-sport.html" class="cat-cube group" data-name="sport fitness">
                <img src="./img/sport.jpg" alt="">
                <span class="text-[#d4af37] text-xs font-bold mb-2 z-10">05</span>
                <span class="cat-title group-hover:text-[#d4af37] transition">Sport</span>
            </a>

            <a href="kat-ogrod.html" class="cat-cube group" data-name="ogród garden">
                <img src="./img/ogrod.jpg" alt="">
                <span class="text-[#d4af37] text-xs font-bold mb-2 z-10">06</span>
                <span class="cat-title group-hover:text-[#d4af37] transition">Ogród</span>
            </a>

            <a href="kat-nowosci.html" class="cat-cube group bg-white/5" data-name="nowości news">
                <span class="text-[#d4af37] text-xs font-bold mb-2 z-10">07</span>
                <span class="cat-title group-hover:text-[#d4af37] transition">Nowości</span>
            </a>

            <a href="kat-outlet.html" class="cat-cube group bg-white/5" data-name="outlet sale">
                <span class="text-[#d4af37] text-xs font-bold mb-2 z-10">08</span>
                <span class="cat-title group-hover:text-[#d4af37] transition">Outlet</span>
            </a>

        </div>
    </main>

    <script>
        window.addEventListener("load", () => {
            const l = document.getElementById("loader");
            setTimeout(() => { l.style.opacity = "0"; setTimeout(() => l.style.display = "none", 400); }, 300);
        });

        const searchInput = document.getElementById('searchInput');
        const cards = document.querySelectorAll('.cat-cube');

        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            cards.forEach(card => {
                const name = card.getAttribute('data-name').toLowerCase();
                card.style.display = name.includes(term) ? 'flex' : 'none';
            });
        });
    </script>
</body>
</html>
