<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
    
    <title>Katalog Produktów | TOMASZEK GROUP - Profesjonalna Dystrybucja</title>
    <meta name="description" content="Odkryj szeroki asortyment produktów Tomaszek Group. Od akcesoriów plażowych po profesjonalne okulary i zabawki. Najwyższa jakość dystrybucji.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://tomaszek.pl/katalog.html">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root { --gold-light: #f3d97d; --gold-dark: #d4af37; --dark-bg: #1e1e26; }
        
        body { 
            font-family: 'Inter', sans-serif; background-color: var(--dark-bg);
            color: white; margin: 0; overflow-x: hidden;
        }

        /* Тонкое свечение фона */
        body::before {
            content: ""; position: fixed; inset: 0;
            background-image: radial-gradient(circle at 50% 0%, rgba(212, 175, 55, 0.03) 0%, transparent 50%);
            pointer-events: none; z-index: 0;
        }

        .logo-text-gold {
            background: linear-gradient(to bottom, var(--gold-light), var(--gold-dark));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* Капсула перевода (как на главной) */
        .lang-capsule {
            display: flex; align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 99px; padding: 6px 14px;
            font-size: 11px; font-weight: 900; letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        /* Стабилизированные карточки (меньше и аккуратнее) */
        .category-card { 
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative; overflow: hidden; aspect-ratio: 4/5; z-index: 10;
        }
        
        .category-card:hover { 
            border-color: var(--gold-dark);
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .category-card img { 
            width: 100%; height: 100%; object-fit: cover; 
            transition: transform 1s ease; 
            filter: brightness(0.6); 
        }

        .category-card:hover img { transform: scale(1.08); filter: brightness(0.9); }

        .card-overlay { 
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 50%); 
            position: absolute; inset: 0; display: flex; flex-direction: column; 
            justify-content: flex-end; padding: 20px; 
        }

        #loader {
            position: fixed; inset: 0; background: #1e1e26;
            display: flex; align-items: center; justify-content: center;
            z-index: 999; transition: opacity 0.6s ease;
        }
    </style>
</head>

<body class="px-6 md:px-16">

    <div id="loader"><div class="text-[#d4af37] text-xl font-900 uppercase italic tracking-[4px] animate-pulse">Tomaszek</div></div>

    <nav class="flex justify-between items-center py-8 border-b border-white/5 relative z-20">
        <a href="index.html" class="flex items-center space-x-3 group">
            <div class="h-8 w-[2px] bg-[#d4af37] group-hover:h-10 transition-all"></div>
            <span class="text-[10px] font-black uppercase tracking-[0.4em] opacity-40 group-hover:opacity-100 transition">Powrót</span>
        </a>
        
        <div class="lang-capsule italic">
            <span class="text-[#d4af37]">PL</span>
            <span class="mx-2 opacity-20">|</span>
            <a href="katalog-en.html" class="opacity-40 hover:opacity-100 transition">EN</a>
        </div>
    </nav>

    <header class="mt-16 mb-12 relative z-20">
        <h1 class="text-4xl md:text-6xl font-black uppercase italic tracking-tighter logo-text-gold">
            NASZ ASORTYMENT
        </h1>
        <p class="mt-4 text-[10px] uppercase tracking-[0.4em] opacity-30 font-bold max-w-xl leading-relaxed">
            Dostarczamy produkty najwyższej jakości do Twojego punktu sprzedaży.
        </p>
    </header>

    <main class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 relative z-20 pb-20">
        
        <div class="category-card"><img src="./img/okulary.jpg"><div class="card-overlay"><h3 class="text-xl font-black uppercase italic tracking-tight">Okulary</h3></div></div>
        
        <div class="category-card"><img src="./img/fejerwerki.jpg"><div class="card-overlay"><h3 class="text-xl font-black uppercase italic tracking-tight">Fejerwerki</h3></div></div>
        
        <div class="category-card"><img src="./img/kaski.jpg"><div class="card-overlay"><h3 class="text-xl font-black uppercase italic tracking-tight">Gogle / Kaski</h3></div></div>
        
        <div class="category-card"><img src="./img/zabawki.jpg"><div class="card-overlay"><h3 class="text-xl font-black uppercase italic tracking-tight">Zabawki</h3></div></div>
        
        <div class="category-card"><img src="./img/plazowe.jpg"><div class="card-overlay"><h3 class="text-xl font-black uppercase italic tracking-tight">Art. Plażowe</h3></div></div>
        
        <div class="category-card"><img src="./img/znicze.jpg"><div class="card-overlay"><h3 class="text-xl font-black uppercase italic tracking-tight">Znicze / Wkłady</h3></div></div>

    </main>

    <footer class="py-10 border-t border-white/5 opacity-20 text-[8px] font-bold uppercase tracking-[0.6em] flex justify-between items-center">
        <span>TOMASZEK GROUP POLAND © 2026</span>
        <span class="hidden md:inline italic">Designed for Excellence</span>
    </footer>

    <script>
        window.addEventListener("load", () => {
            const l = document.getElementById("loader");
            setTimeout(() => {
                l.style.opacity = "0";
                setTimeout(() => l.style.display = "none", 600);
            }, 300);
        });
    </script>
</body>
</html>
