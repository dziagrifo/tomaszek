<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
    
    <title>Katalog | Produkty</title>
    <meta name="description" content="Katalog produktów: zabawki, okulary, artykuły sezonowe.">
    
    <link rel="canonical" href="https://www.tomaszek.pl/katalog.html">
    <link rel="alternate" hreflang="pl" href="https://www.tomaszek.pl/katalog.html">
    <link rel="alternate" hreflang="en" href="https://www.tomaszek.pl/katalog-en.html">
    <link rel="alternate" hreflang="x-default" href="https://www.tomaszek.pl/katalog.html">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root { --gold-light: #f3d97d; --gold-dark: #d4af37; --dark-bg: #1e1e26; }
        body { font-family: 'Inter', sans-serif; background-color: var(--dark-bg); color: white; margin: 0; overflow-x: hidden; }
        
        .logo-text-gold { background: linear-gradient(to bottom, var(--gold-light), var(--gold-dark)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-line { height: 1px; background: linear-gradient(to right, transparent 0%, rgba(255,255,255,0.1) 50%, transparent 100%); width: 100%; }
        
        /* Линия под заголовком (вернул) */
        .separator-line { width: 100%; height: 1px; background: linear-gradient(to right, var(--gold-dark) 0%, rgba(212, 175, 55, 0.3) 70%, transparent 100%); margin-top: 1rem; }

        .btn-back { color: white; font-weight: 900; text-transform: uppercase; letter-spacing: 0.2em; font-size: 11px; transition: all 0.4s ease; }
        .btn-back:hover { color: var(--gold-light); }

        /* Новый стиль Поиска в навигации */
        .search-container { position: relative; margin-right: 20px; }
        .search-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 99px;
            color: white;
            padding: 6px 15px 6px 35px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            outline: none;
            transition: all 0.3s ease;
            width: 150px;
        }
        .search-input:focus { width: 220px; border-color: var(--gold-dark); background: rgba(255, 255, 255, 0.08); }
        .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); opacity: 0.3; pointer-events: none; }

        .lang-capsule { display: flex; align-items: center; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 99px; padding: 6px 12px; font-size: 10px; font-weight: 900; }
        
        .catalog-container { max-width: 1280px; margin: 0 auto; }
        
        .category-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1); position: relative; overflow: hidden; aspect-ratio: 1/1; display: block; }
        .category-card:hover { border-color: var(--gold-dark); transform: translateY(-5px); }
        .category-card img { width: 100%; height: 100%; object-fit: cover; transition: transform 1s ease; filter: brightness(0.5); }
        .category-card:hover img { transform: scale(1.1); filter: brightness(0.7); }
        .card-overlay { background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 60%); position: absolute; inset: 0; display: flex; align-items: flex-end; padding: 25px; }
        
        #loader { position: fixed; inset: 0; background: #1e1e26; display: flex; align-items: center; justify-content: center; z-index: 999; transition: opacity 0.6s ease; }
    </style>
</head>

<body class="px-6">
    <div id="loader"><div class="text-[#d4af37] text-xl font-900 uppercase italic tracking-[4px] animate-pulse">Tomaszek</div></div>

    <nav class="max-w-7xl mx-auto relative z-20">
        <div class="flex justify-between items-center py-8">
            <a href="index.html" class="btn-back">← <span class="ml-2">Powrót</span></a>
            
            <div class="flex items-center">
                <div class="search-container hidden md:block">
                    <svg class="search-icon w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    <input type="text" id="searchInput" placeholder="Szukaj..." class="search-input">
                </div>

                <div class="lang-capsule italic text-white/40">
                    <span class="text-[#d4af37]">PL</span>
                    <span class="mx-2 opacity-20">|</span>
                    <a href="katalog-en.html" class="hover:text-white transition">EN</a>
                </div>
            </div>
        </div>
        <div class="nav-line"></div>
    </nav>

    <header class="catalog-container mt-16 mb-12 relative z-20">
        <h1 class="text-4xl md:text-6xl font-black uppercase italic tracking-tighter logo-text-gold">
            Katalog
        </h1>
        <div class="separator-line"></div>
        <p class="mt-6 text-[10px] uppercase tracking-[0.5em] opacity-30 font-black">Wybierz kategorię produktów</p>
        
        <div class="md:hidden mt-8">
             <input type="text" id="mobileSearchInput" placeholder="Szukaj..." class="search-input w-full">
        </div>
    </header>

    <main id="catalogGrid" class="catalog-container grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-5 relative z-20 pb-24">
        <a href="okulary.html" class="category-card" data-keywords="okulary sun glasses lato"><img src="./img/okulary.jpg" alt="Okulary"><div class="card-overlay"><h3 class="text-lg font-black uppercase italic tracking-tight">Okulary</h3></div></a>
        <a href="fejerwerki.html" class="category-card" data-keywords="fajerwerki petardy pirotechnika"><img src="./img/fejerwerki.jpg" alt="Fejerwerki"><div class="card-overlay"><h3 class="text-lg font-black uppercase italic tracking-tight">Fejerwerki</h3></div></a>
        <a href="kaski.html" class="category-card" data-keywords="kaski gogle narty zima"><img src="./img/kaski.jpg" alt="Kaski"><div class="card-overlay"><h3 class="text-lg font-black uppercase italic tracking-tight">Gogle / Kaski</h3></div></a>
        <a href="zabawki.html" class="category-card" data-keywords="zabawki dzieci toy kids"><img src="./img/zabawki.jpg" alt="Zabawki"><div class="card-overlay"><h3 class="text-lg font-black uppercase italic tracking-tight">Zabawki</h3></div></a>
        <a href="plazowe.html" class="category-card" data-keywords="plaża woda basen lato"><img src="./img/plazowe.jpg" alt="Plażowe"><div class="card-overlay"><h3 class="text-lg font-black uppercase italic tracking-tight">Art. Plażowe</h3></div></a>
        <a href="znicze.html" class="category-card" data-keywords="znicze wkłady cmentarz"><img src="./img/znicze.jpg" alt="Znicze"><div class="card-overlay"><h3 class="text-lg font-black uppercase italic tracking-tight">Znicze / Wkłady</h3></div></a>
        <a href="samochody.html" class="category-card" data-keywords="auta samochody modele"><img src="./img/samochody.jpg" alt="Samochody"><div class="card-overlay"><h3 class="text-lg font-black uppercase italic tracking-tight">Samochody</h3></div></a>
        <a href="rekawy.html" class="category-card" data-keywords="rękawy rekiny pływanie woda"><img src="./img/rekawy.jpg" alt="Rękawy"><div class="card-overlay"><h3 class="text-lg font-black uppercase italic tracking-tight">Rękawy / Rekiny</h3></div></a>
    </main>

    <footer class="catalog-container py-10 border-t border-white/5 opacity-10 text-[8px] font-bold uppercase tracking-[0.6em] flex justify-between">
        <span>TOMASZEK © 2026</span>
        <span class="italic">Katalog Produktów</span>
    </footer>

    <script>
        window.addEventListener("load", () => {
            const l = document.getElementById("loader");
            setTimeout(() => { l.style.opacity = "0"; setTimeout(() => l.style.display = "none", 600); }, 300);
        });

        // Функция поиска (работает и для ПК и для мобилок)
        const runSearch = (query) => {
            const filter = query.toLowerCase();
            const cards = document.querySelectorAll('.category-card');
            cards.forEach(card => {
                const title = card.querySelector('h3').innerText.toLowerCase();
                const keywords = card.getAttribute('data-keywords').toLowerCase();
                if (title.includes(filter) || keywords.includes(filter)) {
                    card.style.display = "block";
                } else {
                    card.style.display = "none";
                }
            });
        };

        document.getElementById('searchInput').addEventListener('input', (e) => runSearch(e.target.value));
        document.getElementById('mobileSearchInput').addEventListener('input', (e) => runSearch(e.target.value));
    </script>
</body>
</html>
