<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
    <title>TOMASZEK | Katalog</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root { --gold: #d4af37; --dark-bg: #1e1e26; }
        body { font-family: 'Inter', sans-serif; background: var(--dark-bg); color: white; margin: 0; }

        .glass-nav { backdrop-filter: blur(15px); background: rgba(0,0,0,0.8); border-bottom: 1px solid rgba(255,255,255,0.05); position: sticky; top: 0; z-index: 100; }
        
        .category-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.4s ease;
            overflow: hidden;
        }
        .category-card:hover {
            border-color: var(--gold);
            background: rgba(255,255,255,0.07);
            transform: translateY(-5px);
        }

        .gold-gradient-text {
            background: linear-gradient(to bottom, #f3d97d, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .lang-capsule {
            display: flex; align-items: center; background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 99px;
            padding: 4px 12px; font-size: 11px; font-weight: 900;
        }
    </style>
</head>

<body>

    <nav class="glass-nav">

            </a>

            <div class="flex items-center space-x-6">

                    <a href="katalog-en.html" class="opacity-40 hover:opacity-100 transition">EN</a>
                </div>
                <a href="index.html" class="text-[10px] uppercase font-bold tracking-widest opacity-60 hover:opacity-100">Powrót</a>
            </div>
        </div>
    </nav>
