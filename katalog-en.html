<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Catalog | TOMASZEK</title>

<meta name="description" content="Product catalog of Tomaszek Group">

<link rel="alternate" hreflang="pl" href="katalog.html">
<link rel="alternate" hreflang="en" href="katalog-en.html">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>

<style>

:root{
--gold-light:#f3d97d;
--gold-dark:#d4af37;
--graphite:#232326;
}

body{
font-family:'Inter',sans-serif;
background-color:var(--graphite);
background-image:
radial-gradient(circle at 0% 0%,rgba(212,175,55,0.15)0%,transparent 35%),
radial-gradient(circle at 100% 100%,rgba(212,175,55,0.1)0%,transparent 35%);
color:white;
margin:0;
min-height:100vh;
position:relative;
}

body::before{
content:"";
position:fixed;
inset:0;
background-image:url("https://www.transparenttextures.com/patterns/stardust.png");
opacity:0.2;
pointer-events:none;
z-index:0;
}

.logo-text-gold{
background:linear-gradient(to bottom,var(--gold-light),var(--gold-dark));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* cards */

.category-card{
background:rgba(26,26,26,0.8);
border:1px solid rgba(212,175,55,0.1);
transition:all .5s cubic-bezier(.2,1,.3,1);
position:relative;
overflow:hidden;
aspect-ratio:1/1;
z-index:10;

opacity:0;
transform:translateY(40px);
animation:fadeUp .8s ease forwards;
}

.category-card:nth-child(1){animation-delay:.1s}
.category-card:nth-child(2){animation-delay:.2s}
.category-card:nth-child(3){animation-delay:.3s}
.category-card:nth-child(4){animation-delay:.4s}
.category-card:nth-child(5){animation-delay:.5s}
.category-card:nth-child(6){animation-delay:.6s}

.category-card:hover{
border-color:var(--gold-dark);
transform:translateY(-10px) scale(1.02);
box-shadow:0 20px 40px rgba(0,0,0,.6),0 0 20px rgba(212,175,55,.2);
}

.category-card img{
width:100%;
height:100%;
object-fit:cover;
object-position:center;
transition:all .8s ease;
filter:brightness(.7);
}

.category-card:hover img{
transform:scale(1.1);
filter:brightness(1);
opacity:.6;
}

.card-overlay{
background:linear-gradient(to top,rgba(0,0,0,.9)0%,transparent 70%);
position:absolute;
inset:0;
display:flex;
flex-direction:column;
justify-content:flex-end;
padding:25px;
}

.white-line{
width:100%;
height:1px;
background:white;
opacity:.3;
}

@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body class="p-6 md:p-16">

<nav class="flex justify-between items-center mb-16 border-b border-white/10 pb-6 relative z-20">

<a href="index-en.html" class="text-[10px] uppercase tracking-[0.4em] opacity-40 hover:opacity-100 transition">
← Back
</a>

<div class="flex space-x-4 text-[11px] font-black italic">

<a href="katalog.html" class="hover:text-[#d4af37] transition opacity-40">
PL
</a>

<span class="opacity-10">|</span>

<span class="text-[#d4af37]">EN</span>

</div>

</nav>

<header class="mb-20 inline-block relative z-20">

<h1 class="text-4xl md:text-6xl font-black uppercase italic tracking-tighter mb-2 pr-6 logo-text-gold">
CATALOG
</h1>

<div class="white-line"></div>

</header>

<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 md:gap-10 relative z-20">

<div class="category-card">
<img src="./img/okulary.jpg" alt="Sunglasses">
<div class="card-overlay"><h3 class="text-2xl font-black uppercase italic">Sunglasses</h3></div>
</div>

<div class="category-card">
<img src="./img/fejerwerki.jpg" alt="Fireworks">
<div class="card-overlay"><h3 class="text-2xl font-black uppercase italic">Fireworks</h3></div>
</div>

<div class="category-card">
<img src="./img/kaski.jpg" alt="Goggles and helmets">
<div class="card-overlay"><h3 class="text-2xl font-black uppercase italic">Goggles / Helmets</h3></div>
</div>

<div class="category-card">
<img src="./img/zabawki.jpg" alt="Toys">
<div class="card-overlay"><h3 class="text-2xl font-black uppercase italic">Toys</h3></div>
</div>

<div class="category-card">
<img src="./img/plazowe.jpg" alt="Beach items">
<div class="card-overlay"><h3 class="text-2xl font-black uppercase italic">Beach Items</h3></div>
</div>

<div class="category-card">
<img src="./img/znicze.jpg" alt="Candles and inserts">
<div class="card-overlay"><h3 class="text-2xl font-black uppercase italic">Candles / Inserts</h3></div>
</div>

</div>

</body>
</html>
