<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
    <title>TOMASZEK | Professionalism & Experience</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root { --gold-light: #f3d97d; --gold-dark: #d4af37; --dark-bg: #1e1e26; }
        body { font-family: 'Inter', sans-serif; background: var(--dark-bg); margin: 0; overflow: hidden; }

        .video-container {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            background: var(--dark-bg);
        }
        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.5;
        }

        .logo-text-gold {
            background: linear-gradient(to bottom, var(--gold-light), var(--gold-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #loader {
            position: fixed; inset: 0; background: #1e1e26;
            display: flex; align-items: center; justify-content: center;
            z-index: 999; transition: opacity 0.6s ease;
        }

        .loader-text { color: #d4af37; font-size: 24px; letter-spacing: 4px; animation: pulse 1.5s infinite; font-weight: 900; }
        @keyframes pulse { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

        .glass-nav { backdrop-filter: blur(15px); background: rgba(0,0,0,0.5); border-bottom: 1px solid rgba(255,255,255,0.05); }

        /* Style for the lang capsule */
        .lang-capsule {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 99px;
            padding: 4px 12px;
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }
        .lang-capsule:hover {
            border-color: var(--gold-dark);
            background: rgba(255, 255, 255, 0.12);
        }

        #mobile-menu {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 0;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.9);
        }
        #mobile-menu.open {
            max-height: 250px;
            padding: 30px 0;
        }
    </style>
</head>

<body>

    <div id="loader"><div class="loader-text uppercase italic">Tomaszek</div></div>

    <div class="video-container">
        <video autoplay muted loop playsinline poster="./img/fallback.jpg">
            <source src="./video/promo.mp4" type="video/mp4">
        </video>
    </div>

    <div class="relative z-10 h-screen flex flex-col justify-between text-white">
        
        <nav class="glass-nav relative z-[100]">
            <div class="flex justify-between items-center px-4 md:px-16 py-5">
                
                <div class="flex items-center space-x-2 md:space-x-4">
                    <img src="./img/logo.png" alt="Logo" class="h-9 md:h-16">
                    <span class="text-xl md:text-5xl font-black uppercase italic logo-text-gold tracking-tighter">Tomaszek</span>
                </div>

                <div class="flex items-center space-x-4 md:space-x-12">
                    
                    <div class="lang-capsule italic">
                        <a href="index.html" class="opacity-40 hover:opacity-100 transition">PL</a>
                        <span class="mx-2 opacity-20">|</span>
                        <span class="text-[#d4af37]">EN</span>
                    </div>

                    <div class="hidden md:flex items-center space-x-10 uppercase text-[11px] font-bold tracking-[0.2em]">
                        <a href="about-us-en.html" class="hover:text-[#d4af37] transition">About Us</a>
                        <a href="contact-en.html" class="hover:text-[#d4af37] transition">Contact</a>
                    </div>

                    <button id="menu-btn" class="md:hidden text-white focus:outline-none">
                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>
                        </svg>
                    </button>
                </div>
            </div>

            <div id="mobile-menu" class="md:hidden border-t border-white/10">
                <div class="flex flex-col items-center space-y-8 uppercase text-[12px] font-bold tracking-[0.3em]">
                    <a href="about-us-en.html" class="hover:text-[#d4af37]">About Us</a>
                    <a href="contact-en.html" class="hover:text-[#d4af37]">Contact</a>
                </div>
            </div>
        </nav>

        <main class="px-6 md:px-16 flex flex-col justify-center flex-grow">
            <div class="max-w-4xl">
                <p class="text-4xl md:text-7xl font-black max-w-3xl leading-none mb-10 border-l-[12px] md:border-l-[18px] border-[#d4af37] pl-6 md:pl-12 uppercase italic">
                    PROFESSIONALISM<br>& EXPERIENCE
                </p>
                <a href="katalog-en.html" class="inline-block bg-[#d4af37] text-black px-10 md:px-16 py-4 md:py-6 font-black uppercase tracking-[0.2em] text-sm md:text-lg hover:bg-white transition-all transform hover:scale-105 shadow-2xl">
                    Open catalog
                </a>
            </div>
        </main>

        <footer class="px-6 md:px-16 py-8 text-[9px] font-bold uppercase tracking-[0.5em] opacity-30 flex justify-between items-center">
            <span>© 2026 TOMASZEK GROUP</span>
            <span class="hidden md:inline italic">Excellence in Distribution</span>
        </footer>
    </div>

    <script>
        window.addEventListener("load", () => {
            const l = document.getElementById("loader");
            l.style.opacity = "0";
            setTimeout(() => l.style.display = "none", 600);
        });

        const btn = document.getElementById("menu-btn");
        const mobileMenu = document.getElementById("mobile-menu");
        
        btn.addEventListener("click", () => {
            mobileMenu.classList.toggle("open");
        });

        document.querySelectorAll('#mobile-menu a').forEach(link => {
            link.addEventListener('click', () => mobileMenu.classList.remove("open"));
        });
    </script>
</body>
</html>
