    <style>
        :root { --gold-light: #f3d97d; --gold-dark: #d4af37; --dark-bg: #1e1e26; }
        body { font-family: 'Inter', sans-serif; background: var(--dark-bg); margin: 0; overflow: hidden; }

        .video-container {
            position: fixed; inset: 0; z-index: 0; overflow: hidden; background: var(--dark-bg);
        }
        .video-container video { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; }

        .logo-text-gold {
            background: linear-gradient(to bottom, var(--gold-light), var(--gold-dark));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* Красивое полноэкранное меню для мобилок */
        #mobile-menu {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(-100%);
            opacity: 0;
        }
        #mobile-menu.active {
            transform: translateY(0);
            opacity: 1;
        }

        .glass-nav { backdrop-filter: blur(15px); background: rgba(0,0,0,0.4); border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        /* Кнопка языка (капсула) */
        .lang-capsule {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(212,175,55,0.3);
            backdrop-filter: blur(5px);
        }
    </style>
</head>
