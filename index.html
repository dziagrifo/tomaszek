<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
    <title>TOMASZEK | Profesjonalizm i Doświadczenie</title>
    <meta name="description" content="Tomaszek Group – lider profesjonalnej dystrybucji.">
    
    <link rel="alternate" hreflang="pl" href="index.html">
    <link rel="alternate" hreflang="en" href="index-en.html">
    <link rel="canonical" href="index.html">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root { --gold-light: #f3d97d; --gold-dark: #d4af37; --dark-bg: #1e1e26; }
        body { font-family: 'Inter', sans-serif; background: var(--dark-bg); margin: 0; overflow-x: hidden; }

        /* Фоновое видео: гарантируем работу на мобильных */
        .video-bg {
            position: fixed;
            inset: 0;
            z-index: -1; /* Строго под всем контентом */
            overflow: hidden;
            background: var(--dark-bg);
        }
        .video-bg video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.5;
        }

        .logo-text-gold {
            background: linear-gradient(to bottom, var(--gold-light), var(--gold-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #loader {
            position: fixed; inset: 0; background: #1e1e26;
            display: flex; align-items: center; justify-content: center;
            z-index: 999; transition: opacity 0.6s ease;
        }

        .loader-text { color: #d4af37; font-size: 24px; letter-spacing: 4px; animation: pulse 1.5s infinite; font-weight: 900; }
        @keyframes pulse { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

        .glass-nav { backdrop-filter: blur(15px); background: rgba(0,0,0,0.5); border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        /* Мобильное меню */
        #mobile-menu {
            max-height: 0;
            overflow: hidden;
            transition: all 0.3s ease-in-out;
        }
        #mobile-menu.open {
            max-height: 300px;
            padding-bottom: 20px;
        }
    </style>
</head>

<body>

    <div id="loader"><div class="loader-text uppercase italic">Tomaszek</div></div>

    <div class="video-bg">
        <video autoplay muted loop playsinline poster="./img/fallback.jpg">
            <source src="./video/promo.mp4" type="video/mp4">
        </video>
    </div>

    <div class="relative z-10 h-screen flex flex-col justify-between text-white">
        
        <nav class="glass-nav">
            <div class="flex justify-between items-center px-4 md:px-16 py-4">
                <div class="flex items-center space-x-2 md:space-x-4">
                    <img src="./img/logo.png" alt="Logo" class="h-8 md:h-16">
                    <span class="text-xl md:text-5xl font-black uppercase italic logo-text-gold tracking-tight">Tomaszek</span>
                </div>
