<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
    
    <title>TOMASZEK | Profesjonalizm i Doświadczenie</title>
    <meta name="description" content="Tomaszek Group – lider profesjonalnej dystrybucji. Poznaj nasz bogaty katalog produktów. Profesjonalizm oparty na doświadczeniu.">
    <meta name="keywords" content="Tomaszek Group, dystrybucja, import, katalog produktów, hurtownia">
    <meta name="robots" content="index, follow">
    
    <meta property="og:title" content="TOMASZEK | Profesjonalna Dystrybucja">
    <meta property="og:description" content="Poznaj nasz profesjonalny katalog produktów.">
    <meta property="og:image" content="./img/logo.png">
    
    <link rel="alternate" hreflang="pl" href="index.html">
    <link rel="alternate" hreflang="en" href="index-en.html">
    <link rel="canonical" href="index.html">

    <link rel="icon" href="./img/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --gold-light: #f3d97d;
            --gold-dark: #d4af37;
            --dark-bg: #1e1e26;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark-bg);
            margin: 0;
            overflow-x: hidden;
        }

        .video-container {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.45; /* Слегка приглушил для читаемости текста */
        }

        .logo-text-gold {
            background: linear-gradient(to bottom, var(--gold-light), var(--gold-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Loader */
        #loader {
            position: fixed;
            inset: 0;
            background: var(--dark-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            transition: opacity 0.6s ease;
        }

        .loader-text {
            color: var(--gold-dark);
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 8px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1); }
        }

        /* Nav Glassmorphism */
        .glass-nav {
            backdrop-filter: blur(12px);
            background: rgba(0, 0, 0, 0.4);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>

<body class="min-h-screen overflow-hidden">

    <div id="loader">
        <div class="loader-text uppercase italic">Tomaszek</div>
    </div>

    <div class="video-container">
        <video autoplay muted loop playsinline poster="./img/fallback.jpg">
            <source src="./video/promo.mp4" type="video/mp4">
        </video>
    </div>

    <div class="relative z-10 h-screen flex flex-col justify-between text-white">

        <nav class="glass-nav flex justify-between items-center px-6 py-5 md:px-16 relative z-50">
            <div class="flex items-center space-x-4">
                <img src="./img/logo.png" alt="Tomaszek Group Logo" class="h-10 md:h-16">
                <span class="text-2xl md:text-4xl font-black uppercase italic logo-text-gold tracking-tighter">
                    Tomaszek
                </span>
            </div>

            <button id="menu-btn" class="md:hidden text-white p-2 focus:outline-none" aria-label="Menu">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
            </button>

            <div id="menu" class="hidden md:flex flex-col md:flex-row items-center absolute md:static top-full left-0 w-full md:w-auto bg-black/90 md:bg-transparent p-10 md:p-0 space-y-8 md:space-y-0 md:space-x-12">
                
                <div class="uppercase text-[11px] font-bold tracking-[0.3em] flex flex-col md:flex-row items-center space-y-6 md:space-y-0 md:space-x-10">
                    <a href="o-firmie.html" class="hover:text-[#d4af37] transition duration-300">O firmie</a>
                    <a href="kontakt.html" class="hover:text-[#d4af37] transition duration-300">Kontakt</a>
                </div>

                <div class="flex items-center space-x-3 text-[10px] font-black border-l border-white/20 pl-6 h-4">
                    <span class="text-[#d4af37] cursor-default">PL</span>
                    <span class="opacity-20">|</span>
                    <a href="index-en.html" class="opacity-50 hover:opacity-100 transition">EN</a>
                </div>
            </div>
        </nav>

        <main class="px-6 md:px-16 flex flex-col justify-center flex-grow">
            <div class="max-w-4xl">
                <p class="text-3xl md:text-6xl font-black max-w-3xl leading-[1.1] mb-12 border-l-[12px] border-[#d4af37] pl-8 uppercase italic">
                    PROFESJONALIZM<br>I DOŚWIADCZENIE
                </p>

                <a href="katalog.html" class="inline-block relative overflow-hidden group bg-[#d4af37] text-black px-14 py-6 font-black uppercase tracking-[0.2em] text-lg transition-all duration-500 hover:bg-[#f3d97d] hover:shadow-[0_0_30px_rgba(212,175,55,0.4)]">
                    <span class="relative z-10">Otwórz katalog</span>
                </a>
            </div>
        </main>

        <footer class="px-6 md:px-16 py-8 flex justify-between items-center text-[10px] font-bold uppercase tracking-[0.4em] opacity-40">
            <span>© 2026 Tomaszek Group Poland</span>
            <span class="hidden md:inline">Quality Distribution</span>
        </footer>

    </div>

    <script>
        // Loader Handler
        window.addEventListener("load", () => {
            const loader = document.getElementById("loader");
            loader.style.opacity = "0";
            setTimeout(() => loader.style.display = "none", 600);
        });

        // Mobile Menu Logic
        const btn = document.getElementById("menu-btn");
        const menu = document.getElementById("menu");

        btn.addEventListener("click", () => {
            menu.classList.toggle("hidden");
            menu.classList.toggle("flex");
        });
        
        // Закрытие меню при клике на ссылку (для мобильных)
        const links = menu.querySelectorAll('a');
        links.forEach(link => {
            link.addEventListener('click', () => {
                if (window.innerWidth < 768) {
                    menu.classList.add('hidden');
                }
            });
        });
    </script>

</body>
</html>
