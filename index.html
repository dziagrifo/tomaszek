<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
    
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com; img-src 'self' data:;">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">

    <title>Tomaszek Group | Hurtownia Zabawek i Artykułów Sezonowych</title>
    <meta name="description" content="Tomaszek Group - Profesjonalna hurtownia zabawek, okularów przeciwsłonecznych i artykułów sezonowych. Najlepsze ceny, najwyższa jakość.">
    
    <link rel="canonical" href="https://www.tomaszek.pl/index.html">
    <link rel="alternate" hreflang="pl" href="https://www.tomaszek.pl/index.html">
    <link rel="alternate" hreflang="en" href="https://www.tomaszek.pl/index-en.html">
    <link rel="alternate" hreflang="x-default" href="https://www.tomaszek.pl/index.html">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.tomaszek.pl/">
    <meta property="og:title" content="Tomaszek Group | Hurtownia">
    <meta property="og:description" content="Importer zabawek i artykułów sezonowych.">
    <meta property="og:image" content="https://www.tomaszek.pl/img/og-image.jpg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root { --gold-light: #f3d97d; --gold-dark: #d4af37; --dark-bg: #1e1e26; }
        body { font-family: 'Inter', sans-serif; background-color: var(--dark-bg); color: white; margin: 0; overflow-x: hidden; }
        
        .logo-text-gold { background: linear-gradient(to bottom, var(--gold-light), var(--gold-dark)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero-title { font-size: clamp(3rem, 10vw, 8rem); line-height: 0.9; font-weight: 900; text-transform: uppercase; italic: true; letter-spacing: -0.05em; }
        
        .nav-link { font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.2em; transition: all 0.4s ease; opacity: 0.5; }
        .nav-link:hover { opacity: 1; color: var(--gold-light); }
        
        .gold-line { height: 1px; background: linear-gradient(to right, var(--gold-dark) 0%, rgba(212, 175, 55, 0.3) 70%, transparent 100%); width: 100%; margin: 20px 0; }
        
        #loader { position: fixed; inset: 0; background: #1e1e26; display: flex; align-items: center; justify-content: center; z-index: 999; }
    </style>
</head>

<body>
    <div id="loader">
        <div class="text-[#d4af37] text-xl font-900 uppercase italic tracking-[4px] animate-pulse">Tomaszek</div>
    </div>

    <nav class="p-8 flex justify-between items-center relative z-20">
        <div class="text-xl font-900 uppercase italic tracking-tighter logo-text-gold">Tomaszek</div>
        <div class="flex items-center gap-8">
            <a href="https://www.tomaszek.pl/katalog.html" class="nav-link">Katalog</a>
            <a href="https://www.tomaszek.pl/kontakt.html" class="nav-link">Kontakt</a>
            <div class="flex gap-2 text-[10px] font-900">
                <span class="text-[#d4af37]">PL</span>
                <span class="opacity-20">|</span>
                <a href="https://www.tomaszek.pl/index-en.html" class="opacity-40 hover:opacity-100 transition">EN</a>
            </div>
        </div>
    </nav>

    <main class="relative flex flex-col justify-center min-h-[80vh] px-8">
        <div class="max-w-7xl mx-auto w-full">
            <p class="text-[10px] uppercase tracking-[0.6em] mb-4 opacity-40 font-bold">Importer & Distributor</p>
            <h1 class="hero-title italic italic text-white">
                QUALITY<br>
                <span class="logo-text-gold uppercase">WITHOUT</span><br>
                LIMITS
            </h1>
            <div class="gold-line"></div>
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-8 mt-8">
                <p class="max-w-md text-sm leading-relaxed opacity-60">
                    Dostarczamy najlepsze rozwiązania dla Twojego biznesu. Od zabawek po akcesoria sezonowe – gwarantujemy najwyższą jakość i profesjonalną obsługę.
                </p>
                <a href="https://www.tomaszek.pl/katalog.html" class="bg-white text-black px-10 py-4 font-900 uppercase italic text-xs tracking-widest hover:bg-[#d4af37] transition-all duration-500 transform hover:-translate-y-1">
                    Sprawdź Katalog
                </a>
            </div>
        </div>
    </main>

    <script>
        window.addEventListener("load", () => {
            const l = document.getElementById("loader");
            setTimeout(() => {
                l.style.opacity = "0";
                setTimeout(() => l.style.display = "none", 600);
            }, 500);
        });
    </script>
</body>
</html>
