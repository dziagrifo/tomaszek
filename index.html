<!DOCTYPE html>
<html lang="pl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">

<title>TOMASZEK | Profesjonalizm i Doświadczenie</title>

<meta name="description" content="Tomaszek Group – lider profesjonalnej dystrybucji.">

<link rel="alternate" hreflang="pl" href="index.html">
<link rel="alternate" hreflang="en" href="index-en.html">
<link rel="canonical" href="index.html">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>

<style>

:root {
--gold-light:#f3d97d;
--gold-dark:#d4af37;
--dark-bg:#1e1e26;
}

body{
font-family:'Inter',sans-serif;
background:var(--dark-bg);
margin:0;
overflow-x:hidden;
}

/* видео фон */

.video-container{
position:fixed;
inset:0;
z-index:0;
overflow:hidden;
background:var(--dark-bg);
}

.video-container video{
width:100%;
height:100%;
object-fit:cover;
opacity:.6;
}

/* золотой текст */

.logo-text-gold{
background:linear-gradient(to bottom,var(--gold-light),var(--gold-dark));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* loader */

#loader{
position:fixed;
inset:0;
background:#1e1e26;
display:flex;
align-items:center;
justify-content:center;
z-index:999;
transition:opacity .6s ease;
}

.loader-text{
color:#d4af37;
font-size:24px;
letter-spacing:4px;
font-weight:900;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%,100%{opacity:.2}
50%{opacity:1}
}

/* navbar */

.glass-nav{
backdrop-filter:blur(10px);
background:rgba(0,0,0,.3);
}

</style>

</head>

<body>

<div id="loader">
<div class="loader-text uppercase italic">Tomaszek</div>
</div>

<div class="video-container">

<video autoplay muted loop playsinline webkit-playsinline preload="metadata" poster="./img/fallback.jpg">
<source src="./video/promo.mp4" type="video/mp4">
</video>

</div>

<div class="relative z-10 h-screen flex flex-col justify-between text-white">

<nav class="glass-nav flex justify-between items-center px-6 py-4 md:px-16">

<div class="flex items-center space-x-4">

<img src="./img/logo.png" alt="Logo" class="h-10 md:h-16">

<span class="text-2xl md:text-5xl font-black uppercase italic logo-text-gold">
Tomaszek
</span>

</div>

<button id="menu-btn" class="md:hidden text-white text-3xl">
☰
</button>

<div id="menu" class="hidden md:flex items-center space-x-12">

<div class="uppercase text-[11px] font-bold tracking-[0.2em] flex space-x-10">

<a href="o-firmie.html" class="hover:text-[#d4af37] transition">
O firmie
</a>

<a href="kontakt.html" class="hover:text-[#d4af37] transition">
Kontakt
</a>

</div>

<div class="flex space-x-3 text-[10px] font-black border-l border-white/20 pl-6">

<span class="text-[#d4af37]">PL</span>

<span class="opacity-30">|</span>

<a href="index-en.html" class="opacity-50 hover:opacity-100">
EN
</a>

</div>

</div>

</nav>

<main class="px-6 md:px-16 flex flex-col justify-center flex-grow">

<div class="max-w-4xl">

<h1 class="text-3xl md:text-6xl font-black max-w-3xl leading-tight mb-10 border-l-8 border-[#d4af37] pl-8 uppercase italic">

PROFESJONALIZM<br>
I DOŚWIADCZENIE

</h1>

<a href="katalog.html"
class="inline-block bg-[#d4af37] text-black px-12 py-5 font-black uppercase tracking-widest text-lg hover:bg-[#f3d97d] transition transform hover:scale-105">

Otwórz katalog

</a>

</div>

</main>

<footer class="px-6 md:px-16 py-6 text-[9px] font-bold uppercase tracking-[0.5em] opacity-40">

© 2026 TOMASZEK GROUP POLAND

</footer>

</div>

<script>

window.addEventListener("load",()=>{

const loader=document.getElementById("loader")

loader.style.opacity="0"

setTimeout(()=>{

loader.style.display="none"

},600)

})

const btn=document.getElementById("menu-btn")
const menu=document.getElementById("menu")

btn.addEventListener("click",()=>{

menu.classList.toggle("hidden")

})

</script>

</body>
</html>
